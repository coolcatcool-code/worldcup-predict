name: ⚽ Update World Cup Scores

on:
  schedule:
    # Every 2 hours during tournament (UTC — covers peak match hours)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual update'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update scores & standings
        run: python scripts/update_scores.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json data/standings.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            LIVE=$(python3 -c "import json; d=json.load(open('data/fixtures.json')); print(sum(1 for m in d['matches'] if m.get('status')=='live'))")
            DONE=$(python3 -c "import json; d=json.load(open('data/fixtures.json')); print(sum(1 for m in d['matches'] if m.get('status')=='done'))")
            git commit -m "⚽ auto: scores updated — ${DONE} done, ${LIVE} live [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
