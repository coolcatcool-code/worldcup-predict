<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 FIFA World Cup · 赛事中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Core palette */
  --ink-950:#060913;
  --ink-900:#0b0f1e;
  --ink-800:#101628;
  --ink-700:#141d33;
  --ink-600:#1a2540;
  --ink-500:#1f2e4d;
  --ink-400:#253659;

  /* Glass surfaces */
  --glass-1:rgba(255,255,255,0.03);
  --glass-2:rgba(255,255,255,0.055);
  --glass-3:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.08);
  --glass-border-h:rgba(255,255,255,0.14);

  /* Accent system */
  --gold:#f59e0b;
  --gold-light:#fbbf24;
  --gold-dim:rgba(245,158,11,0.15);
  --blue:#4f8ef7;
  --blue-dim:rgba(79,142,247,0.15);
  --green:#34d399;
  --green-dim:rgba(52,211,153,0.12);
  --red:#f87171;
  --red-dim:rgba(248,113,113,0.12);
  --violet:#a78bfa;

  /* Text */
  --t1:#f0f4ff;
  --t2:#8fa3c0;
  --t3:#4d6480;
  --t4:#2d4060;

  /* Radius */
  --r-sm:8px;
  --r-md:14px;
  --r-lg:20px;
  --r-xl:28px;

  /* Shadows */
  --s-sm:0 2px 8px rgba(0,0,0,0.4);
  --s-md:0 8px 32px rgba(0,0,0,0.5);
  --s-lg:0 20px 60px rgba(0,0,0,0.6);
  --s-gold:0 0 24px rgba(245,158,11,0.2);
}

body{
  background:var(--ink-950);
  color:var(--t1);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ══════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-500);border-radius:2px}

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:200;
  background:rgba(6,9,19,0.85);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:stretch;padding:0 20px;
  height:56px;gap:20px;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;text-decoration:none;
}
.nav-logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),#ff8c00);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;color:#000;
  box-shadow:var(--s-gold);
}
.nav-logo-text{font-size:.92rem;font-weight:700;color:var(--t1)}
.nav-logo-sub{font-size:.68rem;font-weight:400;color:var(--t3);margin-top:1px}

.tabs{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;flex:1}
.tabs::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;
  padding:0 14px;cursor:pointer;
  color:var(--t3);font-size:.8rem;font-weight:500;
  white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .2s;user-select:none;position:relative;
  letter-spacing:.01em;
}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--t1);border-bottom-color:var(--gold);font-weight:600}
.tab.active::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent,rgba(245,158,11,0.04));
  pointer-events:none;
}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero{
  position:relative;overflow:hidden;
  background:var(--ink-900);
  padding:40px 24px 36px;text-align:center;
  border-bottom:1px solid var(--glass-border);
}
.hero-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 20% 50%,rgba(79,142,247,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 50%,rgba(245,158,11,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 100%,rgba(52,211,153,0.04) 0%,transparent 60%);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:var(--gold-dim);border:1px solid rgba(245,158,11,0.25);
  font-size:.7rem;font-weight:600;color:var(--gold-light);
  letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:14px;
}
.hero h1{
  font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;
  letter-spacing:-.02em;line-height:1.1;
  background:linear-gradient(135deg,var(--t1) 0%,var(--gold-light) 60%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:8px;
}
.hero-sub{color:var(--t2);font-size:.88rem;font-weight:400;margin-bottom:24px}

.hero-stats{
  display:flex;justify-content:center;gap:0;
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-lg);overflow:hidden;
  max-width:600px;margin:0 auto;
}
.hero-stat{
  flex:1;padding:14px 12px;text-align:center;
  border-right:1px solid var(--glass-border);
}
.hero-stat:last-child{border-right:none}
.hero-stat .val{
  font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-stat .lbl{font-size:.65rem;color:var(--t3);margin-top:3px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}

/* ══════════════════════════════════════
   PAGE CONTAINERS
══════════════════════════════════════ */
.page{display:none}
.page.active{display:block}
.container{max-width:1200px;margin:0 auto;padding:20px 20px}

/* ══════════════════════════════════════
   SECTION TITLES
══════════════════════════════════════ */
.section-title{
  font-size:.78rem;font-weight:700;color:var(--t3);
  letter-spacing:.1em;text-transform:uppercase;
  margin:24px 0 12px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--glass-border)}

/* ══════════════════════════════════════
   DATE STRIP
══════════════════════════════════════ */
.date-strip{
  display:flex;gap:6px;overflow-x:auto;
  padding:4px 0 12px;scrollbar-width:none;
}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{
  padding:7px 16px;border-radius:40px;
  border:1px solid var(--glass-border);
  background:var(--glass-1);color:var(--t2);
  cursor:pointer;font-size:.78rem;font-weight:500;
  white-space:nowrap;transition:all .2s;user-select:none;
}
.date-btn:hover{border-color:var(--glass-border-h);color:var(--t1);background:var(--glass-2)}
.date-btn.active{
  background:var(--blue-dim);border-color:var(--blue);
  color:var(--t1);font-weight:600;
}
.date-btn.today{border-color:rgba(245,158,11,0.4);color:var(--gold-light)}
.date-btn.active.today{background:var(--gold-dim);border-color:var(--gold)}

/* ══════════════════════════════════════
   MATCH CARDS
══════════════════════════════════════ */
.matches-grid{display:flex;flex-direction:column;gap:8px}
.match-card{
  background:var(--glass-1);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);
  padding:14px 18px;cursor:pointer;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:16px;
  transition:all .2s;position:relative;overflow:hidden;
}
.match-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:.2s;border-radius:3px 0 0 3px;
}
.match-card:hover{
  border-color:var(--glass-border-h);background:var(--glass-2);
  transform:translateX(2px);box-shadow:var(--s-sm);
}
.match-card:hover::before{background:var(--blue)}
.match-card.live::before{background:var(--red);animation:pulse-bar 1.5s ease-in-out infinite}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.4}}

.team-side{display:flex;align-items:center;gap:10px}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:1.9rem;line-height:1;flex-shrink:0}
.team-name{font-size:.88rem;font-weight:600;color:var(--t1)}
.team-name .sub{
  font-size:.68rem;color:var(--t3);font-weight:400;
  display:block;margin-top:2px;
}

.match-center{text-align:center;min-width:90px}
.match-score{
  font-size:1.35rem;font-weight:800;color:var(--t1);
  letter-spacing:3px;font-variant-numeric:tabular-nums;
}
.match-meta{margin-top:3px}
.match-group-badge{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:6px;
  background:var(--glass-2);color:var(--t2);
  font-size:.64rem;font-weight:600;letter-spacing:.03em;
  border:1px solid var(--glass-border);
}
.badge-live{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,0.3)}
.badge-done{background:var(--green-dim);color:var(--green);border-color:rgba(52,211,153,0.25)}

/* ══════════════════════════════════════
   GROUPS
══════════════════════════════════════ */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.group-card{
  background:var(--glass-1);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);overflow:hidden;
  transition:.2s;
}
.group-card:hover{border-color:var(--glass-border-h)}
.group-header{
  padding:10px 16px;
  background:linear-gradient(90deg,rgba(245,158,11,0.08),transparent);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;gap:10px;
}
.group-letter{
  width:28px;height:28px;border-radius:7px;
  background:var(--gold-dim);border:1px solid rgba(245,158,11,0.3);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.85rem;color:var(--gold-light);
}
.group-title{font-weight:600;font-size:.85rem;color:var(--t1)}
.group-table{width:100%;border-collapse:collapse}
.group-table th{
  font-size:.63rem;color:var(--t3);font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:7px 10px;text-align:center;
  border-bottom:1px solid var(--glass-border);
}
.group-table th:first-child{text-align:left}
.group-table td{
  font-size:.8rem;padding:8px 10px;
  text-align:center;color:var(--t2);
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.group-table td:first-child{
  text-align:left;display:flex;align-items:center;gap:8px;
}
.group-table tr:last-child td{border-bottom:none}
.group-table tr:hover td{background:var(--glass-1)}
.rank-num{font-size:.65rem;color:var(--t4);width:12px;flex-shrink:0}
.team-name-text{cursor:pointer;color:var(--t1);font-weight:500;transition:.15s}
.team-name-text:hover{color:var(--blue)}

/* ══════════════════════════════════════
   TEAM CARDS
══════════════════════════════════════ */
.teams-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{
  padding:5px 14px;border-radius:40px;
  border:1px solid var(--glass-border);
  background:var(--glass-1);color:var(--t2);
  cursor:pointer;font-size:.75rem;font-weight:500;
  transition:all .2s;user-select:none;
}
.filter-btn:hover{border-color:var(--glass-border-h);color:var(--t1)}
.filter-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--t1);font-weight:600}

.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.team-card{
  background:var(--glass-1);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);
  padding:18px 14px 14px;cursor:pointer;
  transition:all .25s;text-align:center;
  position:relative;overflow:hidden;
}
.team-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--blue-dim),transparent 60%);
  opacity:0;transition:.25s;pointer-events:none;
}
.team-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--s-md)}
.team-card:hover::after{opacity:1}
.team-card .flag{font-size:2.6rem;margin-bottom:10px;display:block;line-height:1}
.team-card .tname{font-size:.88rem;font-weight:700;color:var(--t1);margin-bottom:3px}
.team-card .tgroup{
  font-size:.68rem;color:var(--t3);margin-bottom:8px;
  display:inline-flex;align-items:center;gap:4px;
}
.team-card .trank{
  display:inline-block;padding:2px 8px;border-radius:20px;
  background:var(--gold-dim);border:1px solid rgba(245,158,11,0.25);
  font-size:.68rem;font-weight:700;color:var(--gold-light);
  margin-bottom:6px;
}
.team-card .tcoach{font-size:.7rem;color:var(--t3);margin-top:4px}
.team-card .tstar{
  font-size:.72rem;color:var(--green);margin-top:3px;
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ══════════════════════════════════════
   NEWS CARDS
══════════════════════════════════════ */
.news-grid{display:flex;flex-direction:column;gap:8px}
.news-card{
  background:var(--glass-1);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);
  padding:16px 18px;cursor:pointer;
  transition:all .2s;
  display:flex;gap:14px;align-items:flex-start;
}
.news-card:hover{border-color:var(--glass-border-h);background:var(--glass-2)}
.news-card-accent{
  width:3px;border-radius:3px;flex-shrink:0;align-self:stretch;min-height:40px;
}
.news-card-body{flex:1;min-width:0}
.news-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:5px;
  font-size:.63rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:7px;
}
.tag-predict{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(79,142,247,0.25)}
.tag-predict + .news-card-accent, .news-card.predict .news-card-accent{background:var(--blue)}
.tag-review{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,0.25)}
.tag-news{background:var(--gold-dim);color:var(--gold-light);border:1px solid rgba(245,158,11,0.25)}
.news-title{font-size:.9rem;font-weight:600;color:var(--t1);margin-bottom:5px;line-height:1.4}
.news-excerpt{font-size:.76rem;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-footer{
  display:flex;justify-content:space-between;
  margin-top:9px;font-size:.67rem;color:var(--t3);
}

/* ══════════════════════════════════════
   PREDICT CARDS
══════════════════════════════════════ */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.pred-card{
  background:var(--glass-1);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);overflow:hidden;
  cursor:pointer;transition:all .25s;
}
.pred-card:hover{border-color:var(--glass-border-h);transform:translateY(-2px);box-shadow:var(--s-md)}

.pred-header{
  padding:16px;
  background:linear-gradient(135deg,rgba(15,22,45,.9),rgba(20,29,51,.9));
  border-bottom:1px solid var(--glass-border);
}
.pred-teams{
  display:grid;grid-template-columns:1fr 40px 1fr;
  align-items:center;gap:8px;margin-bottom:6px;
}
.pred-team{text-align:center}
.pred-flag{font-size:1.8rem;margin-bottom:4px}
.pred-name{font-size:.78rem;font-weight:600;color:var(--t1)}
.pred-vs{
  text-align:center;font-size:.72rem;font-weight:700;
  color:var(--t3);letter-spacing:.05em;
}
.pred-time{
  font-size:.68rem;color:var(--t3);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:4px;
}

.pred-body{padding:14px 16px}
.pred-bar-row{
  display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:6px;
}
.pred-bar-h{background:#4f8ef7;transition:width .8s ease}
.pred-bar-d{background:#475569;transition:width .8s ease}
.pred-bar-a{background:#f87171;transition:width .8s ease}
.pred-probs{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  margin-bottom:12px;
}
.pred-prob-item{text-align:center}
.pred-prob-item .pct{font-size:.95rem;font-weight:700}
.pred-prob-item .plbl{font-size:.63rem;color:var(--t3);margin-top:1px}
.pred-score-box{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:9px;background:var(--gold-dim);
  border:1px solid rgba(245,158,11,0.2);border-radius:var(--r-sm);
  margin-bottom:10px;
}
.pred-score-box .lbl{font-size:.65rem;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.pred-score-box .score{font-size:1.1rem;font-weight:800;color:var(--gold-light)}
.pred-analysis{
  font-size:.73rem;color:var(--t2);line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.stat-box{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:18px;text-align:center;
  transition:.2s;
}
.stat-box:hover{border-color:var(--glass-border-h)}
.stat-box .sv{
  font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-box .sl{font-size:.7rem;color:var(--t3);margin-top:5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.chart-wrap{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:18px 20px;
}
.chart-wrap h3{font-size:.78rem;color:var(--t2);margin-bottom:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* ══════════════════════════════════════
   ARCHIVE
══════════════════════════════════════ */
.archive-list{display:flex;flex-direction:column;gap:8px}
.archive-item{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-md);overflow:hidden;transition:.2s;
}
.archive-item:hover{border-color:var(--glass-border-h)}
.archive-date{
  padding:12px 16px;font-size:.82rem;font-weight:600;color:var(--t2);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  user-select:none;transition:.2s;
}
.archive-date:hover{color:var(--t1);background:var(--glass-1)}
.arc-chevron{
  width:20px;height:20px;border-radius:50%;background:var(--glass-2);
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;transition:.2s;color:var(--t3);
}
.archive-body{display:none}
.archive-body.open{display:block;border-top:1px solid var(--glass-border)}

/* ══════════════════════════════════════
   MODALS
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(4,6,14,0.85);
  z-index:1000;display:none;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px) saturate(80%);
  -webkit-backdrop-filter:blur(8px) saturate(80%);
  padding:0;
}
.modal-overlay.open{display:flex;animation:fade-in .2s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--ink-800);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-width:680px;width:100%;
  max-height:92vh;overflow-y:auto;
  position:relative;
  animation:slide-up .3s cubic-bezier(.16,1,.3,1);
}
@media(min-width:640px){
  .modal-overlay{align-items:center;padding:20px}
  .modal{border-radius:var(--r-xl);max-height:88vh}
  @keyframes slide-up{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
}
@keyframes slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}

.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--ink-500);border-radius:2px}

.modal-header{
  position:sticky;top:0;
  background:rgba(16,22,40,0.95);
  backdrop-filter:blur(12px);
  padding:16px 20px;
  border-bottom:1px solid var(--glass-border);
  display:flex;justify-content:space-between;align-items:center;
  z-index:1;
}
.modal-header h2{font-size:.95rem;font-weight:700;color:var(--t1)}
.modal-close-btn{
  width:28px;height:28px;border-radius:50%;
  background:var(--glass-2);border:1px solid var(--glass-border);
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:.2s;
}
.modal-close-btn:hover{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.modal-body{padding:20px}

/* Team modal internals */
.tm-hero{
  display:flex;align-items:center;gap:16px;
  padding:16px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--ink-700),var(--ink-600));
  border:1px solid var(--glass-border);margin-bottom:16px;
}
.tm-hero-flag{font-size:3.8rem;flex-shrink:0}
.tm-hero-info h3{font-size:1.15rem;font-weight:800;color:var(--t1);margin-bottom:4px}
.tm-hero-info p{font-size:.78rem;color:var(--t2);line-height:1.5;margin-bottom:2px}
.tm-hero-info .best{color:var(--gold-light);font-weight:600}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.meta-item{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);padding:10px 12px;
}
.meta-item .ml{font-size:.63rem;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.meta-item .mv{font-size:.82rem;font-weight:600;color:var(--t1)}

.tm-section{margin-bottom:16px}
.tm-section-title{
  font-size:.68rem;font-weight:700;color:var(--t3);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--glass-border);
}
.tm-text{
  font-size:.8rem;color:var(--t2);line-height:1.65;
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);padding:12px;
}

.players-list{display:flex;flex-direction:column;gap:6px}
.player-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);transition:.15s;
}
.player-row:hover{border-color:var(--glass-border-h)}
.player-pos{
  width:26px;height:18px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;flex-shrink:0;
}
.pos-fw{background:rgba(248,113,113,.15);color:var(--red)}
.pos-mf{background:rgba(79,142,247,.15);color:var(--blue)}
.pos-df{background:rgba(52,211,153,.15);color:var(--green)}
.pos-gk{background:rgba(245,158,11,.15);color:var(--gold-light)}
.player-name{font-size:.83rem;font-weight:600;color:var(--t1);flex:1}
.player-club{font-size:.7rem;color:var(--t3)}
.star-badge{
  font-size:.62rem;padding:1px 6px;border-radius:6px;
  background:var(--gold-dim);color:var(--gold-light);
  border:1px solid rgba(245,158,11,.25);flex-shrink:0;
}

/* Match modal internals */
.mm-hero{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:12px;align-items:center;text-align:center;
  padding:18px;
  background:linear-gradient(135deg,var(--ink-700),var(--ink-600));
  border:1px solid var(--glass-border);border-radius:var(--r-md);
  margin-bottom:16px;
}
.mm-team{display:flex;flex-direction:column;align-items:center;gap:6px}
.mm-flag{font-size:2.8rem}
.mm-tname{font-size:.88rem;font-weight:700;color:var(--t1)}
.mm-rank{font-size:.65rem;color:var(--t3)}
.mm-center{}
.mm-score{font-size:2rem;font-weight:900;color:var(--t1);letter-spacing:4px;font-variant-numeric:tabular-nums}
.mm-time{font-size:.72rem;color:var(--t2);margin-top:3px}
.mm-venue{font-size:.65rem;color:var(--t3);margin-top:2px}
.mm-badge{
  display:inline-block;margin-top:4px;padding:2px 8px;border-radius:5px;
  font-size:.62rem;font-weight:600;
  background:var(--blue-dim);color:var(--blue);border:1px solid rgba(79,142,247,.25);
}

.prob-section{margin-bottom:16px}
.prob-header{
  font-size:.68rem;font-weight:700;color:var(--t3);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.prob-bars-row{
  display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:6px;
}
.prob-h{background:var(--blue);transition:width .8s ease}
.prob-d{background:#475569;transition:width .8s ease}
.prob-a{background:var(--red);transition:width .8s ease}
.prob-labels{display:flex;justify-content:space-between;font-size:.72rem}
.prob-pct{font-weight:700}
.prob-lbl{color:var(--t3);font-size:.65rem;margin-top:2px}
.prob-three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.prob-box{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);padding:10px;text-align:center;
}
.prob-box .pval{font-size:1.1rem;font-weight:800}
.prob-box .pnam{font-size:.65rem;color:var(--t3);margin-top:3px}

.pred-score-modal{
  padding:12px;text-align:center;
  background:var(--gold-dim);border:1px solid rgba(245,158,11,.2);
  border-radius:var(--r-sm);margin-bottom:14px;
}
.pred-score-modal .l{font-size:.63rem;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.pred-score-modal .s{font-size:1.4rem;font-weight:900;color:var(--gold-light)}

.analysis-card{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);padding:12px;margin-bottom:8px;
}
.analysis-card .ah{font-size:.72rem;font-weight:700;color:var(--t1);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.analysis-card .at{font-size:.78rem;color:var(--t2);line-height:1.6}

.team-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.team-link-btn{
  background:var(--glass-1);border:1px solid var(--glass-border);
  border-radius:var(--r-sm);padding:10px 12px;cursor:pointer;
  text-align:center;transition:.2s;
}
.team-link-btn:hover{border-color:var(--blue);background:var(--blue-dim)}
.team-link-btn .ll{font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.team-link-btn .ln{font-size:.8rem;font-weight:600;color:var(--blue)}
.team-link-btn .ls{font-size:.68rem;color:var(--green);margin-top:2px}

/* News modal */
.news-modal-content{font-size:.82rem;color:var(--t2);line-height:1.7}
.news-modal-content p{margin-bottom:10px}

/* LOADING */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;gap:16px;
}
.spinner{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--glass-border);
  border-top-color:var(--gold);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.78rem;color:var(--t3)}

.empty{
  text-align:center;padding:60px;
  color:var(--t3);font-size:.82rem;
}

/* RESPONSIVE */
@media(max-width:480px){
  .hero h1{font-size:1.4rem}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
  .pred-grid{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:1fr}
  .mm-hero{grid-template-columns:1fr auto 1fr;gap:8px}
  .mm-flag{font-size:2.2rem}
  .prob-three{gap:5px}
}

/* Animations */
@keyframes card-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.team-card, .match-card, .news-card, .pred-card{animation:card-in .3s ease both}

</style>
</head>
<body>

<!-- NAV -->

      <div class="nav-logo-text">World Cup 2026</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-badge">🏆 FIFA World Cup 2026</div>
  <h1>2026 FIFA 世界杯</h1>

  <div class="hero-stats">

    <div class="hero-stat"><div class="val">48</div><div class="lbl">参赛球队</div></div>
    <div class="hero-stat"><div class="val">104</div><div class="lbl">总场次</div></div>

  <div class="modal">
    <div class="modal-header">
      <h2 id="newsModalTitle">资讯详情</h2>

    </div>
    <div class="modal-body" id="newsModalBody"></div>
  </div>

<script>
// ─── GLOBALS ───────────────────────────────────────────────────────────────
const BASE = location.hostname === 'localhost' ? '' : '';
const CACHE = {};
let FX = null, TP = null, IDX = null;
let currentTab = 'schedule';
let currentDateStr = null;

function toBeijing(u){ return new Date(new Date(u).getTime() + 8*3600*1000); }
function fmtKey(d){ return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function fmtTime(u){ const d=toBeijing(u); return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }
function nowBJ(){ return toBeijing(Date.now()); }
function todayKey(){ return fmtKey(nowBJ()); }

async function gj(path){
  if(CACHE[path]) return CACHE[path];
  try{
    const r = await fetch(path+'?t='+Date.now());
    if(!r.ok) return null;
    const j = await r.json();
    CACHE[path] = j;
    return j;
  } catch(e){ return null; }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('scheduleError').style.display='none';
  document.getElementById('scheduleLoading').style.display='flex';
  document.getElementById('scheduleContent').style.display='none';

  // hero days count
  const start = new Date('2026-06-11');
  const end = new Date('2026-07-19');
  const now = new Date();
  if(now < start){ const d=Math.ceil((start-now)/86400000); document.getElementById('daysLeft').textContent=d+'天后'; }
  else if(now <= end){ const d=Math.floor((now-start)/86400000)+1; document.getElementById('daysLeft').textContent='第'+d+'天'; }
  else{ document.getElementById('daysLeft').textContent='已结束'; }

  [FX, TP, IDX] = await Promise.all([
    gj('data/fixtures.json'),
    gj('data/team_profiles.json'),
    gj('data/index.json')
  ]);

  if(!FX){ document.getElementById('scheduleLoading').style.display='none'; document.getElementById('scheduleError').style.display='block'; return; }

  document.getElementById('scheduleLoading').style.display='none';
  document.getElementById('scheduleContent').style.display='block';

  renderSchedule();
  renderGroups();
  renderTeams();
  renderNews();
  renderStats();
  renderArchive();
}

// ─── TABS ───────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e=>{
  const tab = e.target.closest('[data-tab]');
  if(!tab) return;
  const t = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  currentTab = t;
  if(t==='predict') renderPredict();
  if(t==='stats') renderStats();
});

// ─── SCHEDULE ───────────────────────────────────────────────────────────────
function renderSchedule(){
  if(!FX) return;
  const allMatches = [...(FX.matches||[]), ...(FX.knockout||[])];
  const today = todayKey();
  const byDate = {};
  allMatches.forEach(m=>{
    const k = fmtKey(toBeijing(m.utc));
    if(!byDate[k]) byDate[k]=[];
    byDate[k].push(m);
  });

  const todayArr = byDate[today]||[];
  const todayEl = document.getElementById('todayMatches');
  todayEl.innerHTML = todayArr.length ? todayArr.map(m=>matchCardHTML(m)).join('') : '<div class="empty">今日暂无比赛</div>';

  const allDates = Object.keys(byDate).sort();
  const strip = document.getElementById('dateStrip');
  strip.innerHTML = allDates.map(d=>{
    const label = d===today ? '今天' : d.slice(5).replace('-','/');
    const isToday = d===today;
    return `<button class="date-btn${d===today?' active today':''}" data-date="${d}">${label}</button>`;
  }).join('');

  strip.addEventListener('click', e=>{
    const btn = e.target.closest('.date-btn');
    if(!btn) return;
    document.querySelectorAll('.date-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    currentDateStr = btn.dataset.date;
    renderDateMatches(byDate[currentDateStr]||[]);
  });

  currentDateStr = today;
  renderDateMatches(todayArr);
}

function renderDateMatches(arr){
  const el = document.getElementById('dateMatches');
  el.innerHTML = arr.length ? arr.map(m=>matchCardHTML(m)).join('') : '<div class="empty">该日期无比赛</div>';
}

function matchCardHTML(m){
  const hTeam = getTeamByName(m.home);
  const aTeam = getTeamByName(m.away);
  const hFlag = hTeam?hTeam.flag:(FX.teams&&FX.teams[m.home]?FX.teams[m.home].flag:'🏳️');
  const aFlag = aTeam?aTeam.flag:(FX.teams&&FX.teams[m.away]?FX.teams[m.away].flag:'🏳️');
  const hName = hTeam?hTeam.name:m.home;
  const aName = aTeam?aTeam.name:m.away;
  const bjTime = fmtTime(m.utc);
  const now = Date.now();
  const ms = new Date(m.utc).getTime();
  const isLive = now>ms && now<ms+105*60*1000;
  const isDone = now>ms+105*60*1000;
  const badge = isLive ? '<span class="match-group-badge badge-live">🔴 进行中</span>'
               : isDone ? '<span class="match-group-badge badge-done">已结束</span>'
               : `<span class="match-group-badge">${m.group?'小组'+m.group:m.round||'淘汰赛'}</span>`;
  const score = m.score || (isDone?'? - ?':bjTime);
  return `<div class="match-card${isLive?' live':''}" onclick="openMatchModal('${m.id}')">
    <div class="team-side">
      <div class="team-flag">${hFlag}</div>
      <div class="team-name">${hName}<span class="sub">${m.home}</span></div>
    </div>
    <div class="match-center">
      <div class="match-score">${score}</div>
      <div class="match-meta">${badge}</div>
      <div class="match-meta" style="font-size:.65rem;color:var(--t3)">${m.venue||''}</div>
    </div>
    <div class="team-side right">
      <div class="team-flag">${aFlag}</div>
      <div class="team-name">${aName}<span class="sub">${m.away}</span></div>
    </div>
  </div>`;
}

// ─── GROUPS ─────────────────────────────────────────────────────────────────
function renderGroups(){
  if(!FX) return;
  const el = document.getElementById('groupsContent');
  const groups = FX.groups||{};
  el.innerHTML = Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([g,teams])=>{
    const rows = teams.map((t,i)=>{
      const tp = getTeamByCode(t) || getTeamByName(t) || {};
      const flag = tp.flag || (FX.teams&&FX.teams[t]?FX.teams[t].flag:'🏳️');
      const name = tp.name || t;
      const rank = tp.fifaRank||'-';
      return `<tr>
        <td><span class="rank-num">${i+1}</span>${flag} <span class="team-name-text" onclick="openTeamModal('${t}')" style="cursor:pointer">${name}</span></td>
        <td>${rank}</td>
        <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
      </tr>`;
    }).join('');
    return `<div class="group-card">
      <div class="group-header"><div class="group-letter">${g}</div><div class="group-title">第${g}组</div></div>
      <table class="group-table">
        <thead><tr><th>球队</th><th>排名</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>分</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ─── TEAMS ──────────────────────────────────────────────────────────────────
function renderTeams(){
  if(!TP) return;
  const teams = TP.teams||{};
  const confs = [...new Set(Object.values(teams).map(t=>t.confederation).filter(Boolean))].sort();
  const filter = document.getElementById('teamsFilter');
  filter.innerHTML = ['全部',...confs].map((c,i)=>
    `<button class="filter-btn${i===0?' active':''}" data-conf="${c}">${c}</button>`
  ).join('');
  filter.addEventListener('click', e=>{
    const btn = e.target.closest('.filter-btn');
    if(!btn) return;
    filter.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    renderTeamCards(btn.dataset.conf);
  });
  renderTeamCards('全部');
}

function renderTeamCards(conf){
  const teams = TP?TP.teams:{};

// ─── MATCH MODAL ─────────────────────────────────────────────────────────────
async function openMatchModal(id){
  if(!FX) return;
  const allMatches = [...(FX.matches||[]), ...(FX.knockout||[])];
  const m = allMatches.find(x=>x.id===id);
  if(!m) return;
  const hTeam = getTeamByName(m.home)||{};
  const aTeam = getTeamByName(m.away)||{};
  const hFlag = hTeam.flag||(FX.teams&&FX.teams[m.home]?FX.teams[m.home].flag:'🏳️');
  const aFlag = aTeam.flag||(FX.teams&&FX.teams[m.away]?FX.teams[m.away].flag:'🏳️');
  const hName = hTeam.name||m.home;
  const aName = aTeam.name||m.away;
  const bjTime = fmtTime(m.utc);
  const bjDate = fmtKey(toBeijing(m.utc));
  const score = m.score||'-';

  // Try to find prediction
  let pred = null;
  const predData = await gj(`data/predictions/${bjDate}.json`);
  if(predData&&predData.matches){
    pred = predData.matches.find(x=>x.id===id||
      (x.homeCode&&hTeam.code&&x.homeCode===hTeam.code)||
      (x.home&&(x.home===m.home||x.home===hName)));
  }

  let predHTML = '';
  if(pred&&pred.predictions){
    const p = pred.predictions.fable5||pred.predictions.opta||{};
    const h=p.home||33,dr=p.draw||33,a=p.away||34;
    const sc = pred.predictions.fable5?pred.predictions.fable5.score:'';
    predHTML = `
      <div class="prob-section">
        <div class="prob-header">AI 预测概率</div>
        <div class="prob-three">
          <div class="prob-box"><div class="pval" style="color:var(--blue)">${h}%</div><div class="pnam">${hName}胜</div></div>
          <div class="prob-box"><div class="pval" style="color:#6b7280">${dr}%</div><div class="pnam">平局</div></div>
          <div class="prob-box"><div class="pval" style="color:var(--red)">${a}%</div><div class="pnam">${aName}胜</div></div>
        </div>
        <div class="prob-bars-row">
          <div class="prob-h" style="flex:${h}"></div>
        <div class="prob-d" style="flex:${dr}"></div>
        <div class="prob-a" style="flex:${a}"></div>
        </div>
      </div>
      ${sc?`<div class="pred-score-modal"><div class="l">🎯 AI预测比分</div><div class="s">${sc}</div></div>`:''}
      ${pred.analysis?`<div class="analysis-card"><div class="ah">📋 赛前分析</div><div class="at">${pred.analysis}</div></div>`:''}
      ${pred.keyRisk?`<div class="analysis-card" style="border-color:rgba(245,158,11,.2)"><div class="ah" style="color:var(--gold-light)">⚠️ 关键变数</div><div class="at">${pred.keyRisk}</div></div>`:''}
    `;
  }

  document.getElementById('matchModalTitle').textContent = hName+' vs '+aName;
  document.getElementById('matchModalBody').innerHTML = `
    <div class="mm-hero">
      <div class="mm-team">
        <div class="mm-flag">${hFlag}</div>
        <div class="mm-tname">${hName}</div>
        ${hTeam.fifaRank?`<div class="mm-rank">FIFA #${hTeam.fifaRank}</div>`:''}
      </div>
      <div class="mm-center">
        <div class="mm-score">${score}</div>
        <div class="mm-time">${bjDate} ${bjTime} BJ</div>
        <div class="mm-venue">${m.venue||''}</div>
        ${m.group?`<div class="mm-badge">小组 ${m.group}</div>`:''}
      </div>
      <div class="mm-team">
        <div class="mm-flag">${aFlag}</div>
        <div class="mm-tname">${aName}</div>
        ${aTeam.fifaRank?`<div class="mm-rank">FIFA #${aTeam.fifaRank}</div>`:''}
      </div>
    </div>
    <div class="team-links">
      <div class="team-link-btn" onclick="closeModal('matchModal');openTeamModal('${m.home}')">
        <div class="ll">主队详情</div>
        <div class="ln">🔍 ${hName}</div>
        ${hTeam.starPlayer?`<div class="ls">⭐ ${hTeam.starPlayer}</div>`:''}
      </div>
      <div class="team-link-btn" onclick="closeModal('matchModal');openTeamModal('${m.away}')">
        <div class="ll">客队详情</div>
        <div class="ln">🔍 ${aName}</div>
        ${aTeam.starPlayer?`<div class="ls">⭐ ${aTeam.starPlayer}</div>`:''}
      </div>
    </div>
    ${predHTML}
  `;
  openModal('matchModal');
}

// ─── PREDICT ─────────────────────────────────────────────────────────────────
async function renderPredict(){
  const ldEl = document.getElementById('predictLoading');
  const ctEl = document.getElementById('predictContent');
  const emEl = document.getElementById('predictEmpty');
  ldEl.style.display='flex'; ctEl.style.display='none'; emEl.style.display='none';

  const today = todayKey();
  const data = await gj(`data/predictions/${today}.json`);
  ldEl.style.display='none';
  if(!data||!data.matches||!data.matches.length){emEl.style.display='block';return;}

  ctEl.style.display='block';
  ctEl.innerHTML = `<div class="pred-grid">${data.matches.map(m=>predCardHTML(m)).join('')}</div>`;
}

function predCardHTML(m){
  const p5 = m.predictions?m.predictions.fable5:{};
  const op = m.predictions?m.predictions.opta:{};
  const h=p5.home||op.home||33, dr=p5.draw||op.draw||33, a=p5.away||op.away||34;

  const hTeam = getTeamByName(m.home)||getTeamByCode(m.homeCode)||{};
  const aTeam = getTeamByName(m.away)||getTeamByCode(m.awayCode)||{};
  return `<div class="pred-card" onclick="openMatchModal('${m.id}')">
    <div class="pred-header">
      <div class="pred-teams">
        <div class="pred-team"><div class="pred-flag">${hTeam.flag||'🏳️'}</div><div class="pred-name">${hTeam.name||m.home}</div></div>
        <div class="pred-vs">VS</div>
        <div class="pred-team"><div class="pred-flag">${aTeam.flag||'🏳️'}</div><div class="pred-name">${aTeam.name||m.away}</div></div>
      </div>
      <div class="pred-time">⏰ ${m.kickoffBeijing?m.kickoffBeijing.slice(5,10)+' '+m.kickoffBeijing.slice(11,16)+' BJ':''}</div>
    </div>
    <div class="pred-body">
      <div class="pred-bar-row">
        <div class="pred-bar-h" style="flex:${h}"></div>
        <div class="pred-bar-d" style="flex:${dr}"></div>
        <div class="pred-bar-a" style="flex:${a}"></div>

      <div class="pred-probs">
        <div class="pred-prob-item"><div class="pct" style="color:var(--blue)">${h}%</div><div class="plbl">主胜</div></div>
        <div class="pred-prob-item"><div class="pct" style="color:#6b7280">${dr}%</div><div class="plbl">平局</div></div>

// ─── STATS ───────────────────────────────────────────────────────────────────
async function renderStats(){
  const stats = await gj('data/stats.json');
  if(!stats) return;
  const t = stats.totals||{};
  const f5 = t.fable5||{};
  const el = document.getElementById('statsCards');
  el.innerHTML = [
    {v:t.matches||0, l:'已预测场次'},
    {v:f5.correct||0, l:'Fable5正确次数'},
    {v:f5.total>0?Math.round(f5.correct/f5.total*100)+'%':'--', l:'Fable5准确率'},
    {v:t.opta?Math.round((t.opta.correct||0)/(t.opta.total||1)*100)+'%':'--', l:'Opta准确率'},
  ].map(x=>`<div class="stat-box"><div class="sv">${x.v}</div><div class="sl">${x.l}</div></div>`).join('');
  loadChartJs(stats);
}

function loadChartJs(stats){
  if(window.Chart){ renderChart(stats); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload=()=>renderChart(stats);
  s.onerror=()=>{};
  document.head.appendChild(s);
}

function renderChart(stats){
  const ctx = document.getElementById('accuracyChart');
  if(!ctx||!stats.series||!stats.series.length) return;
  const labels = stats.series.map(x=>x.date.slice(5));
  const f5 = stats.series.map(x=>x.fable5Acc||0);
  new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{label:'Fable5准确率',data:f5,borderColor:'#f59e0b',tension:.4,fill:true,backgroundColor:'rgba(245,158,11,.1)',pointRadius:4}]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{y:{beginAtZero:true,max:100,ticks:{color:'#64748b',callback:v=>v+'%'},grid:{color:'rgba(30,58,95,.5)'}},x:{ticks:{color:'#64748b'},grid:{color:'rgba(30,58,95,.3)'}}}}
  });
}

// ─── ARCHIVE ─────────────────────────────────────────────────────────────────
async function renderArchive(){
  const idx = IDX||await gj('data/index.json');
  const el = document.getElementById('archiveList');
  if(!idx||!idx.dates||!idx.dates.length){el.innerHTML='<div class="empty">暂无归档数据</div>';return;}
  el.innerHTML = idx.dates.sort((a,b)=>b.localeCompare(a)).map(d=>`
    <div class="archive-item">
      <div class="archive-date" onclick="toggleArchive('${d}')">
        📅 ${d} 预测&回顾
        <span id="arc-icon-${d}">▶</span>
      </div>
      <div class="archive-body" id="arc-${d}"></div>
    </div>
  `).join('');
}

async function toggleArchive(date){
  const body = document.getElementById('arc-'+date);
  const icon = document.getElementById('arc-icon-'+date);
  if(body.classList.contains('open')){body.classList.remove('open');icon.textContent='▶';return;}
  body.classList.add('open');
  icon.textContent='▼';
  if(body.innerHTML.trim()) return;
  body.innerHTML='<div class="loading" style="padding:20px"><div class="spinner"></div><span>加载中...</span></div>';
  const [pred, rev] = await Promise.all([gj(`data/predictions/${date}.json`),gj(`data/reviews/${date}.json`)]);
  let html = '';
  if(pred&&pred.matches&&pred.matches.length){
    html += `<div style="font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px">📋 预测 (${pred.matches.length}场)</div>`;
    html += pred.matches.map(m=>{
      const p5=m.predictions?m.predictions.fable5:{};
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem">
        <span style="color:var(--text)">${m.home} vs ${m.away}</span>
        <span style="color:var(--accent)">${p5.score||'?-?'} (${p5.home||'-'}%/${p5.draw||'-'}%/${p5.away||'-'}%)</span>
      </div>`;
    }).join('');
  }
  if(rev&&rev.results&&rev.results.length){
    html += `<div style="font-size:.82rem;font-weight:700;color:var(--text2);margin:12px 0 8px">📝 回顾 (${rev.results.length}场)</div>`;
    html += rev.results.map(r=>`
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem">
        <span style="color:var(--text)">${r.home} vs ${r.away}</span>
        <span style="color:${r.correct?'var(--accent3)':'var(--accent4)'}">${r.actual||'?'} ${r.correct?'✓':'✗'}</span>
      </div>
    `).join('');
  }
  if(!html) html = '<div class="empty">该日期暂无数据</div>';
  body.innerHTML = `<div style="padding:12px">${html}</div>`;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function getTeamByCode(code){
  if(!TP) return null;
  return TP.teams[code]||null;
}
function getTeamByName(name){
  if(!TP) return null;
  const teams = TP.teams;
  return Object.values(teams).find(t=>t.nameEn===name||t.name===name||
    t.nameEn.toLowerCase()===name.toLowerCase());
}

function openModal(id){
  document.getElementById(id).classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('click', e=>{
  if(e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));
  }
});
