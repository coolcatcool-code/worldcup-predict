<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#060913">
<meta name="description" content="2026 FIFA 世界杯赛事中心 — 实时比分、AI预测、48支球队完整资料">
<link rel="manifest" href="manifest.json">
<title>2026 FIFA World Cup · 赛事中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Backgrounds */
  --ink-950:#03050d;--ink-900:#060913;--ink-800:#090d1a;--ink-700:#0d1222;--ink-600:#11182c;--ink-500:#172035;
  /* Surfaces */
  --surface-0:rgba(255,255,255,.018);--surface-1:rgba(255,255,255,.038);--surface-2:rgba(255,255,255,.065);--surface-3:rgba(255,255,255,.10);
  /* Legacy compat */
  --glass-1:rgba(255,255,255,.025);--glass-2:rgba(255,255,255,.05);--glass-3:rgba(255,255,255,.08);
  /* Borders */
  --gb:rgba(255,255,255,.07);--gbh:rgba(255,255,255,.14);
  /* Gold */
  --gold:#f59e0b;--gold-l:#fbbf24;--gold-d:rgba(245,158,11,.1);--gold-glow:rgba(245,158,11,.22);
  /* Blue */
  --blue:#4f8ef7;--blue-l:#7db0ff;--blue-d:rgba(79,142,247,.1);--blue-glow:rgba(79,142,247,.18);
  /* Other */
  --green:#34d399;--green-d:rgba(52,211,153,.1);
  --red:#f87171;--red-d:rgba(248,113,113,.1);
  --violet:#a78bfa;
  /* Text */
  --t1:#eef2ff;--t2:#8fa3c0;--t3:#4d6480;--t4:#2a3a52;
  /* Radius */
  --r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  /* Shadows */
  --s-sm:0 2px 8px rgba(0,0,0,.45);--s-md:0 8px 32px rgba(0,0,0,.55);--s-lg:0 20px 64px rgba(0,0,0,.65);
  --s-gold:0 0 28px var(--gold-glow);--s-blue:0 0 28px var(--blue-glow);
  /* Easing */
  --spring:cubic-bezier(.16,1,.3,1);--smooth:cubic-bezier(.4,0,.2,1);
}
body{background:var(--ink-950);color:var(--t1);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--ink-500);border-radius:2px}

/* ── KEYFRAMES ───────────────────────────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes fade-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes scale-in{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes slide-up{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:none}}
@keyframes pulse-ring{0%{transform:scale(.9);opacity:.7}100%{transform:scale(1.5);opacity:0}}
@keyframes orb-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.04)}}
@keyframes live-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.6)}70%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
@keyframes bar-slide{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes reveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── SCROLL REVEAL ───────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(14px);transition:opacity .5s var(--smooth),transform .5s var(--smooth)}
.reveal.in{opacity:1;transform:none}
.reveal-d1{transition-delay:.06s}.reveal-d2{transition-delay:.12s}.reveal-d3{transition-delay:.18s}.reveal-d4{transition-delay:.24s}

/* ── NAV ─────────────────────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:200;background:rgba(3,5,13,.90);backdrop-filter:blur(28px) saturate(200%);border-bottom:1px solid var(--gb);display:flex;align-items:stretch;padding:0 20px;height:54px;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;padding:8px 0}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold) 0%,#ff8c00 100%);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;color:#000;box-shadow:0 0 20px var(--gold-glow);transition:.2s}
.nav-logo:hover .nav-logo-icon{transform:rotate(-5deg) scale(1.08)}
.nav-logo-text{font-size:.9rem;font-weight:800;color:var(--t1);letter-spacing:-.01em}
.nav-logo-sub{font-size:.6rem;font-weight:400;color:var(--t3);margin-top:1px;letter-spacing:.04em}
.tabs{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;flex:1;position:relative}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;padding:0 13px;cursor:pointer;color:var(--t3);font-size:.76rem;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:color .18s,border-color .18s;user-select:none;position:relative}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--t1);border-bottom-color:var(--gold);font-weight:600}
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-btn{width:32px;height:32px;border-radius:8px;background:var(--surface-1);border:1px solid var(--gb);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:.2s;flex-shrink:0}
.nav-btn:hover{background:var(--surface-2);border-color:var(--gbh);color:var(--t1);transform:scale(1.05)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:live-pulse 2s ease-in-out infinite;margin-right:2px}

/* ── HERO ─────────────────────────────────────────────────────── */
.hero{position:relative;overflow:hidden;background:var(--ink-900);padding:36px 20px 32px;text-align:center;border-bottom:1px solid var(--gb)}
.hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
.hero-orb-1{width:420px;height:420px;background:rgba(79,142,247,.07);top:-100px;left:-80px;animation:orb-float 8s ease-in-out infinite}
.hero-orb-2{width:360px;height:360px;background:rgba(245,158,11,.06);top:-80px;right:-60px;animation:orb-float 10s ease-in-out infinite reverse}
.hero-orb-3{width:280px;height:280px;background:rgba(52,211,153,.04);bottom:-60px;left:50%;transform:translateX(-50%);animation:orb-float 12s ease-in-out infinite 2s}
.hero-noise{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--gold-d);border:1px solid rgba(245,158,11,.2);font-size:.62rem;font-weight:700;color:var(--gold-l);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;animation:fade-up .6s var(--spring) both}
.hero h1{font-size:clamp(1.6rem,4.5vw,2.4rem);font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--t1) 0%,var(--gold-l) 50%,#ff8c00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fade-up .6s var(--spring) .08s both}
.hero-sub{color:var(--t2);font-size:.82rem;margin-bottom:22px;animation:fade-up .6s var(--spring) .16s both}
.hero-stats{display:flex;justify-content:center;background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-lg);overflow:hidden;max-width:520px;margin:0 auto;animation:fade-up .6s var(--spring) .24s both;box-shadow:var(--s-sm)}
.hero-stat{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--gb);transition:.2s;cursor:default}
.hero-stat:hover{background:var(--surface-1)}
.hero-stat:last-child{border-right:none}
.hero-stat .val{font-size:1.45rem;font-weight:900;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.hero-stat .lbl{font-size:.58rem;color:var(--t3);margin-top:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* ── INSTALL BANNER ──────────────────────────────────────────── */
#installBanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:299;background:rgba(13,18,34,.95);backdrop-filter:blur(20px);border-top:1px solid var(--gb);padding:14px 20px;align-items:center;gap:12px}
#installBanner.show{display:flex;animation:fade-up .3s var(--spring)}
#installBanner .ib-text{flex:1;font-size:.8rem;color:var(--t1);font-weight:600}
#installBanner .ib-sub{font-size:.67rem;color:var(--t2);margin-top:2px;font-weight:400}
#installBanner .ib-install{padding:8px 18px;border-radius:10px;background:var(--gold);color:#000;font-size:.78rem;font-weight:700;border:none;cursor:pointer;transition:.15s}
#installBanner .ib-install:hover{background:var(--gold-l);transform:scale(1.03)}
#installBanner .ib-close{width:28px;height:28px;border-radius:50%;background:var(--surface-2);border:none;color:var(--t2);cursor:pointer;font-size:.8rem;transition:.15s}
#installBanner .ib-close:hover{background:var(--red-d);color:var(--red)}

/* ── SEARCH OVERLAY ─────────────────────────────────────────── */
.search-overlay{position:fixed;inset:0;z-index:500;background:rgba(2,4,12,.92);backdrop-filter:blur(16px);display:none;flex-direction:column;padding:20px 16px}
.search-overlay.open{display:flex;animation:fade-in .15s ease}
.search-box{display:flex;align-items:center;gap:10px;background:var(--ink-700);border:1px solid var(--gbh);border-radius:var(--r-md);padding:13px 16px;margin-bottom:14px;box-shadow:0 0 0 3px var(--blue-d)}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:1rem;font-family:inherit}
.search-input::placeholder{color:var(--t4)}
.search-close-btn{background:var(--surface-2);border:1px solid var(--gb);border-radius:6px;color:var(--t2);cursor:pointer;font-size:.78rem;padding:4px 8px;transition:.15s}
.search-close-btn:hover{color:var(--t1)}
.search-results{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-sm);cursor:pointer;transition:.15s}
.search-result-item:hover{background:var(--surface-1);border-color:var(--gbh);transform:translateX(3px)}
.sr-icon{font-size:1.5rem;width:36px;text-align:center;flex-shrink:0}
.sr-main{flex:1;min-width:0}
.sr-title{font-size:.88rem;font-weight:600;color:var(--t1)}
.sr-sub{font-size:.72rem;color:var(--t2);margin-top:2px}
.sr-type{font-size:.6rem;color:var(--t3);flex-shrink:0;background:var(--surface-2);padding:2px 7px;border-radius:5px;border:1px solid var(--gb)}
.search-empty{text-align:center;padding:50px;color:var(--t3);font-size:.82rem}

/* ── PAGES & LAYOUT ─────────────────────────────────────────── */
.page{display:none}.page.active{display:block;animation:fade-in .2s ease}
.container{max-width:1200px;margin:0 auto;padding:18px 20px}

/* ── SECTION TITLES ─────────────────────────────────────────── */
.section-title{font-size:.67rem;font-weight:700;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gb),transparent)}

/* ── DATE STRIP ─────────────────────────────────────────────── */
.date-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{padding:7px 16px;border-radius:40px;border:1px solid var(--gb);background:var(--surface-0);color:var(--t3);cursor:pointer;font-size:.74rem;font-weight:500;white-space:nowrap;transition:all .18s;user-select:none}
.date-btn:hover{border-color:var(--gbh);color:var(--t2);background:var(--surface-1)}
.date-btn.active{background:var(--blue-d);border-color:var(--blue);color:var(--t1);font-weight:600;box-shadow:0 0 12px var(--blue-glow)}
.date-btn.today{border-color:rgba(245,158,11,.35);color:var(--t2)}
.date-btn.active.today{background:var(--gold-d);border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}

/* ── MATCH CARDS ─────────────────────────────────────────────── */
.matches-grid{display:flex;flex-direction:column;gap:8px}
.match-card{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);padding:14px 18px;cursor:pointer;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;transition:all .2s var(--smooth);position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:.2s;border-radius:3px 0 0 3px}
.match-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(79,142,247,.04),transparent 50%);opacity:0;transition:.2s;pointer-events:none}
.match-card:hover{border-color:var(--gbh);background:var(--surface-1);transform:translateX(3px) translateY(-1px);box-shadow:var(--s-sm)}
.match-card:hover::before{background:var(--blue)}
.match-card:hover::after{opacity:1}
.match-card.live{border-color:rgba(248,113,113,.35)}
.match-card.live::before{background:var(--red);animation:bar-slide 1.5s ease-in-out infinite}
.match-card.live::after{background:linear-gradient(90deg,rgba(248,113,113,.06),transparent 50%)}
.match-card.fav-match{border-color:rgba(245,158,11,.28)}
.match-card.fav-match::before{background:var(--gold)}
.team-side{display:flex;align-items:center;gap:10px}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:1.8rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.team-name{font-size:.86rem;font-weight:600;color:var(--t1);line-height:1.2}
.team-name .sub{font-size:.62rem;color:var(--t3);font-weight:400;display:block;margin-top:2px}
.match-center{text-align:center;min-width:88px}
.match-score{font-size:1.3rem;font-weight:900;color:var(--t1);letter-spacing:4px;font-variant-numeric:tabular-nums;line-height:1}
.match-score.live-score{color:var(--red)}
.match-group-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;background:var(--surface-2);color:var(--t3);font-size:.59rem;font-weight:600;letter-spacing:.03em;border:1px solid var(--gb);margin-top:4px}
.badge-live{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3)}
.badge-done{background:rgba(52,211,153,.09);color:var(--green);border-color:rgba(52,211,153,.25)}
.match-prob-bar{height:3px;border-radius:2px;overflow:hidden;display:flex;margin-top:6px;opacity:.6;transition:opacity .2s}
.match-card:hover .match-prob-bar{opacity:1}
.mpb-h{background:var(--blue)}.mpb-d{background:var(--t4)}.mpb-a{background:var(--red)}

/* ── SKELETON ────────────────────────────────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--ink-700) 25%,var(--ink-600) 50%,var(--ink-700) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
.skel-match{height:68px;border-radius:var(--r-md);margin-bottom:8px}
.skel-team-card{height:180px;border-radius:var(--r-md)}
.skel-text{height:13px;border-radius:4px;margin-bottom:8px}
.skel-text.short{width:40%}

/* ── FAVORITE SECTION ────────────────────────────────────────── */
.fav-section{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.14);border-radius:var(--r-lg);padding:14px 18px;margin-bottom:18px}
.fav-section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.68rem;font-weight:700;color:var(--gold-l);letter-spacing:.08em;text-transform:uppercase}
.fav-empty-hint{font-size:.75rem;color:var(--t3);padding:8px 0}

/* ── GROUP CARDS ─────────────────────────────────────────────── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.group-card{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);overflow:hidden;transition:.2s}
.group-card:hover{border-color:var(--gbh);box-shadow:var(--s-sm)}
.group-header{padding:10px 16px;background:linear-gradient(90deg,rgba(245,158,11,.07),transparent);border-bottom:1px solid var(--gb);display:flex;align-items:center;gap:10px}
.group-letter{width:28px;height:28px;border-radius:7px;background:var(--gold-d);border:1px solid rgba(245,158,11,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;color:var(--gold-l);flex-shrink:0}
.group-title{font-weight:700;font-size:.82rem;color:var(--t1)}
.group-table{width:100%;border-collapse:collapse}
.group-table th{font-size:.58rem;color:var(--t4);font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;text-align:center;border-bottom:1px solid var(--gb)}
.group-table th:first-child{text-align:left;padding-left:14px}
.group-table td{font-size:.77rem;padding:8px 10px;text-align:center;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.025)}
.group-table td:first-child{text-align:left;padding-left:14px}
.group-table tr:last-child td{border-bottom:none}
.group-table tr:hover td{background:var(--surface-1)}
.group-table .rank-num{font-size:.6rem;color:var(--t4);margin-right:5px}
.qualify-line{position:relative}
.qualify-line td{border-bottom:1px solid rgba(52,211,153,.2)!important}
.rank-qualify{display:inline-flex;width:16px;height:16px;border-radius:4px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.2);align-items:center;justify-content:center;font-size:.54rem;color:var(--green);margin-right:4px;font-weight:700}
.team-row-flag{margin-right:4px}
.team-name-text{cursor:pointer;color:var(--t1);font-weight:500;transition:.15s}
.team-name-text:hover{color:var(--blue)}

/* ── TEAM CARDS ──────────────────────────────────────────────── */
.teams-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:40px;border:1px solid var(--gb);background:var(--surface-0);color:var(--t2);cursor:pointer;font-size:.72rem;font-weight:500;transition:all .18s;user-select:none}
.filter-btn:hover{border-color:var(--gbh);color:var(--t1)}
.filter-btn.active{background:var(--blue-d);border-color:var(--blue);color:var(--t1);font-weight:600}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px}
.team-card{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);padding:18px 14px 14px;cursor:pointer;transition:all .22s var(--smooth);text-align:center;position:relative;overflow:hidden}
.team-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue-d),transparent 60%);opacity:0;transition:.22s;pointer-events:none}
.team-card:hover{border-color:rgba(79,142,247,.35);transform:translateY(-4px);box-shadow:var(--s-md),var(--s-blue)}
.team-card:hover::before{opacity:1}
.team-card.favorited{border-color:rgba(245,158,11,.3)}
.team-card.favorited::before{background:linear-gradient(135deg,var(--gold-d),transparent 60%);opacity:1}
.fav-btn{position:absolute;top:9px;right:9px;width:24px;height:24px;background:var(--surface-2);border:1px solid var(--gb);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;z-index:1;transition:.2s;color:var(--t3)}
.fav-btn:hover{background:var(--gold-d);color:var(--gold-l);border-color:rgba(245,158,11,.3);transform:scale(1.1)}
.fav-btn.active{background:var(--gold-d);color:var(--gold-l);border-color:rgba(245,158,11,.3)}
.team-card .flag{font-size:2.5rem;margin-bottom:9px;display:block;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
.team-card .tname{font-size:.85rem;font-weight:700;color:var(--t1);margin-bottom:2px}
.team-card .tgroup{font-size:.62rem;color:var(--t3);margin-bottom:8px}
.team-card .trank{display:inline-block;padding:3px 9px;border-radius:20px;background:var(--gold-d);border:1px solid rgba(245,158,11,.22);font-size:.62rem;font-weight:700;color:var(--gold-l);margin-bottom:6px}
.team-card .tcoach{font-size:.64rem;color:var(--t3);margin-top:3px}
.team-card .tstar{font-size:.68rem;color:var(--green);margin-top:4px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.form-dots{display:flex;justify-content:center;gap:3px;margin-top:8px}
.form-dot{width:6px;height:6px;border-radius:50%}
.fd-w{background:var(--green)}.fd-d{background:var(--t3)}.fd-l{background:var(--red)}

/* ── NEWS ────────────────────────────────────────────────────── */
.news-grid{display:flex;flex-direction:column;gap:8px}
.news-card{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;gap:14px;align-items:flex-start}
.news-card:hover{border-color:var(--gbh);background:var(--surface-1);transform:translateX(3px)}
.news-card-accent{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch;min-height:44px}
.news-card-body{flex:1;min-width:0}
.news-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:.58rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:7px}
.tag-predict{background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
.tag-review{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.tag-news{background:var(--gold-d);color:var(--gold-l);border:1px solid rgba(245,158,11,.2)}
.news-title{font-size:.9rem;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.45}
.news-excerpt{font-size:.74rem;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-footer{display:flex;justify-content:space-between;margin-top:9px;font-size:.62rem;color:var(--t3)}

/* ── PREDICT ─────────────────────────────────────────────────── */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.pred-card{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:all .22s var(--smooth)}
.pred-card:hover{border-color:var(--gbh);transform:translateY(-3px);box-shadow:var(--s-md)}
.pred-header{padding:16px;background:linear-gradient(160deg,var(--ink-700),var(--ink-600));border-bottom:1px solid var(--gb)}
.pred-teams{display:grid;grid-template-columns:1fr 36px 1fr;align-items:center;gap:8px;margin-bottom:8px}
.pred-team{text-align:center}
.pred-flag{font-size:1.75rem;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.pred-name{font-size:.76rem;font-weight:700;color:var(--t1)}
.pred-vs{text-align:center;font-size:.65rem;font-weight:700;color:var(--t4);letter-spacing:.05em;background:var(--surface-2);padding:4px;border-radius:6px;border:1px solid var(--gb)}
.pred-time{font-size:.62rem;color:var(--t3);text-align:center}
.pred-body{padding:14px 16px}
.pred-bar-row{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-bottom:6px;gap:1px}
.pred-bar-h{background:var(--blue);transition:flex .8s ease}
.pred-bar-d{background:#475569;transition:flex .8s ease}
.pred-bar-a{background:var(--red);transition:flex .8s ease}
.pred-probs{display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:12px;background:var(--surface-1);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--gb)}
.pred-prob-item{text-align:center;padding:8px 4px;border-right:1px solid var(--gb)}
.pred-prob-item:last-child{border-right:none}
.pred-prob-item .pct{font-size:.92rem;font-weight:800}
.pred-prob-item .plbl{font-size:.58rem;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.pred-score-box{display:flex;align-items:center;justify-content:center;gap:10px;padding:9px;background:var(--gold-d);border:1px solid rgba(245,158,11,.18);border-radius:var(--r-sm);margin-bottom:10px}
.pred-score-box .lbl{font-size:.6rem;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.pred-score-box .score{font-size:1.05rem;font-weight:900;color:var(--gold-l)}
.pred-analysis{font-size:.7rem;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── STATS ───────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px;margin-bottom:18px}
.stat-box{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);padding:18px 16px;text-align:center;transition:.2s;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold-d),transparent 60%);opacity:0;transition:.2s}
.stat-box:hover{border-color:var(--gbh);box-shadow:var(--s-sm)}
.stat-box:hover::before{opacity:1}
.stat-box .sv{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.stat-box .sl{font-size:.64rem;color:var(--t3);margin-top:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.chart-wrap{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);padding:18px}
.chart-wrap h3{font-size:.68rem;color:var(--t3);margin-bottom:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}

/* ── ARCHIVE ─────────────────────────────────────────────────── */
.archive-list{display:flex;flex-direction:column;gap:8px}
.archive-item{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-md);overflow:hidden;transition:.2s}
.archive-item:hover{border-color:var(--gbh)}
.archive-date{padding:13px 16px;font-size:.8rem;font-weight:600;color:var(--t2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:.15s}
.archive-date:hover{color:var(--t1);background:var(--surface-1)}
.arc-chevron{width:20px;height:20px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--t3);transition:.2s}
.archive-body{display:none}.archive-body.open{display:block;border-top:1px solid var(--gb)}

/* ── MODALS ──────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,12,.90);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(12px);padding:0}
.modal-overlay.open{display:flex;animation:fade-in .2s ease}
@media(min-width:640px){.modal-overlay{align-items:center;padding:20px}}
.modal{background:var(--ink-800);border:1px solid var(--gb);border-radius:var(--r-xl) var(--r-xl) 0 0;max-width:700px;width:100%;max-height:92vh;overflow-y:auto;animation:slide-up .3s var(--spring);box-shadow:var(--s-lg)}
@media(min-width:640px){.modal{border-radius:var(--r-xl);max-height:88vh}}
@media(min-width:640px){@keyframes slide-up{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}}
.modal::before{content:'';display:block;width:40px;height:4px;background:var(--gb);border-radius:2px;margin:10px auto 0}
@media(min-width:640px){.modal::before{display:none}}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--ink-500)}
.modal-header{position:sticky;top:0;background:rgba(9,13,26,.96);backdrop-filter:blur(16px);padding:14px 20px;border-bottom:1px solid var(--gb);display:flex;justify-content:space-between;align-items:center;z-index:1}
.modal-header h2{font-size:.92rem;font-weight:700;color:var(--t1)}
.modal-close-btn{width:28px;height:28px;border-radius:50%;background:var(--surface-2);border:1px solid var(--gb);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:.2s}
.modal-close-btn:hover{background:var(--red-d);border-color:rgba(248,113,113,.3);color:var(--red);transform:rotate(90deg)}
.modal-body{padding:18px 20px}

/* Team modal */
.tm-hero{display:flex;align-items:center;gap:16px;padding:16px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--ink-700),var(--ink-600));border:1px solid var(--gb);margin-bottom:16px}
.tm-hero-flag{font-size:3.6rem;flex-shrink:0;filter:drop-shadow(0 4px 10px rgba(0,0,0,.6))}
.tm-hero-info h3{font-size:1.1rem;font-weight:800;color:var(--t1);margin-bottom:4px}
.tm-hero-info p{font-size:.76rem;color:var(--t2);line-height:1.55;margin-bottom:2px}
.tm-hero-info .best{color:var(--gold-l);font-weight:600;font-size:.76rem}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.meta-item{background:var(--surface-1);border:1px solid var(--gb);border-radius:var(--r-sm);padding:10px 13px}
.meta-item .ml{font-size:.58rem;color:var(--t3);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.meta-item .mv{font-size:.8rem;font-weight:600;color:var(--t1)}
.tm-section{margin-bottom:16px}
.tm-section-title{font-size:.62rem;font-weight:700;color:var(--t4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gb)}
.tm-text{font-size:.78rem;color:var(--t2);line-height:1.68;background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-sm);padding:12px 14px}
.players-list{display:flex;flex-direction:column;gap:5px}
.player-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-sm);transition:.15s}
.player-row:hover{border-color:var(--gbh);background:var(--surface-1)}
.player-pos{width:26px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:700;flex-shrink:0}
.pos-fw{background:rgba(248,113,113,.14);color:var(--red)}
.pos-mf{background:rgba(79,142,247,.14);color:var(--blue)}
.pos-df{background:rgba(52,211,153,.12);color:var(--green)}
.pos-gk{background:rgba(245,158,11,.12);color:var(--gold-l)}
.player-name{font-size:.8rem;font-weight:600;color:var(--t1);flex:1}
.player-club{font-size:.66rem;color:var(--t3)}
.star-badge{font-size:.58rem;padding:2px 6px;border-radius:5px;background:var(--gold-d);color:var(--gold-l);border:1px solid rgba(245,158,11,.22);flex-shrink:0}

/* Match modal */
.mm-hero{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;text-align:center;padding:18px;background:linear-gradient(135deg,var(--ink-700),var(--ink-600));border:1px solid var(--gb);border-radius:var(--r-md);margin-bottom:16px}
.mm-team{display:flex;flex-direction:column;align-items:center;gap:6px}
.mm-flag{font-size:2.7rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.5))}
.mm-tname{font-size:.86rem;font-weight:700;color:var(--t1)}
.mm-rank{font-size:.62rem;color:var(--t3)}
.mm-score{font-size:2rem;font-weight:900;color:var(--t1);letter-spacing:6px;text-shadow:0 0 30px rgba(255,255,255,.1)}
.mm-score.live{color:var(--red);text-shadow:0 0 20px rgba(248,113,113,.3)}
.mm-time{font-size:.7rem;color:var(--t2);margin-top:3px}
.mm-venue{font-size:.62rem;color:var(--t3);margin-top:1px}
.mm-badge{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:5px;font-size:.6rem;font-weight:600;background:var(--blue-d);color:var(--blue);border:1px solid rgba(79,142,247,.22)}
.team-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.team-link-btn{background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-sm);padding:10px 13px;cursor:pointer;text-align:center;transition:.2s}
.team-link-btn:hover{border-color:rgba(79,142,247,.35);background:var(--blue-d)}
.team-link-btn .ll{font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.team-link-btn .ln{font-size:.78rem;font-weight:600;color:var(--blue)}
.team-link-btn .ls{font-size:.65rem;color:var(--green);margin-top:2px}
.prob-section{margin-bottom:16px}
.prob-header{font-size:.62rem;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.prob-three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.prob-box{background:var(--surface-1);border:1px solid var(--gb);border-radius:var(--r-sm);padding:10px 8px;text-align:center}
.prob-box .pval{font-size:1.1rem;font-weight:900}
.prob-box .pnam{font-size:.6rem;color:var(--t3);margin-top:3px}
.prob-bars-row{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:12px;gap:1px}
.prob-h{background:var(--blue)}.prob-d{background:#475569}.prob-a{background:var(--red)}
.pred-score-modal{padding:12px;text-align:center;background:var(--gold-d);border:1px solid rgba(245,158,11,.18);border-radius:var(--r-sm);margin-bottom:14px}
.pred-score-modal .l{font-size:.59rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.pred-score-modal .s{font-size:1.35rem;font-weight:900;color:var(--gold-l)}
.analysis-card{background:var(--surface-1);border:1px solid var(--gb);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px}
.analysis-card .ah{font-size:.72rem;font-weight:700;color:var(--t1);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.analysis-card .at{font-size:.76rem;color:var(--t2);line-height:1.62}

/* H2H */
.h2h-section{margin-bottom:16px}
.h2h-summary{display:flex;align-items:center;margin-bottom:10px}
.h2h-bar{flex:1;height:8px;border-radius:4px;overflow:hidden;display:flex;gap:1px}
.h2h-h-wins{background:var(--blue)}.h2h-draws{background:#475569}.h2h-a-wins{background:var(--red)}
.h2h-labels{display:grid;grid-template-columns:1fr 1fr 1fr;font-size:.68rem;margin-bottom:10px;text-align:center}
.h2h-match{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface-0);border:1px solid var(--gb);border-radius:var(--r-sm);margin-bottom:5px;font-size:.75rem;transition:.15s}
.h2h-match:hover{border-color:var(--gbh)}
.h2h-match-date{font-size:.62rem;color:var(--t3);min-width:70px}
.h2h-match-comp{font-size:.62rem;color:var(--t3);max-width:80px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h2h-match-score{font-weight:700;color:var(--t1);background:var(--surface-2);padding:3px 10px;border-radius:4px;border:1px solid var(--gb)}
.h2h-match-note{font-size:.6rem;color:var(--gold-l);margin-top:2px;text-align:center}

/* News modal */
.news-modal-content{font-size:.8rem;color:var(--t2);line-height:1.72}
.news-modal-content p{margin-bottom:12px}

/* Toast */
#toast-container{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink-600);border:1px solid var(--gbh);border-radius:40px;padding:9px 18px;font-size:.78rem;color:var(--t1);font-weight:500;box-shadow:var(--s-md);animation:fade-up .25s var(--spring)}
.toast-success{border-color:rgba(52,211,153,.3);color:var(--green)}
.toast-info{border-color:rgba(79,142,247,.3);color:var(--blue-l)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:16px}
.spinner{width:30px;height:30px;border-radius:50%;border:2px solid var(--gb);border-top-color:var(--gold);animation:spin .75s linear infinite}
.loading-text{font-size:.74rem;color:var(--t3)}
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:.8rem}

/* ── Mobile Bottom Navigation ────────────────────────────────── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(3,5,13,.96);backdrop-filter:blur(28px) saturate(200%);border-top:1px solid var(--gb);padding:0;padding-bottom:env(safe-area-inset-bottom)}
#bottom-nav .bn-inner{display:flex;align-items:stretch;height:56px}
#bottom-nav .bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--t3);font-size:.52rem;font-weight:500;border:none;background:transparent;transition:.2s var(--smooth);padding:6px 1px;position:relative;letter-spacing:.02em}
#bottom-nav .bn-btn .bn-icon{font-size:1.2rem;line-height:1;transition:.2s var(--spring)}
#bottom-nav .bn-btn.active{color:var(--gold)}
#bottom-nav .bn-btn.active .bn-icon{transform:scale(1.15) translateY(-1px)}
#bottom-nav .bn-btn.active::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px}
#bottom-nav .bn-btn:active .bn-icon{transform:scale(.9)}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:640px){
  #bottom-nav{display:block}
  .tabs{display:none}
  #app{padding-bottom:calc(56px + env(safe-area-inset-bottom,0px))}
  .container{padding:14px 16px}
}
@media(max-width:480px){
  .hero{padding:26px 16px 22px}
  .hero h1{font-size:1.4rem}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
  .pred-grid{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:1fr}
  .mm-flag{font-size:2.1rem}
  .prob-three{gap:5px}
  .team-flag{font-size:1.55rem}
  .match-card{padding:11px 14px;gap:10px}
}
@media(max-width:360px){
  .nav-logo-sub{display:none}
  .team-name .sub{display:none}
  .match-score{font-size:1.15rem}
}
</style>
</head>
<body>
<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">⚽</div>
    <div><div class="nav-logo-text">World Cup 2026</div><div class="nav-logo-sub">赛事中心</div></div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="schedule">赛程</div>
    <div class="tab" data-tab="groups">小组</div>
    <div class="tab" data-tab="teams">球队</div>
    <div class="tab" data-tab="news">资讯</div>
    <div class="tab" data-tab="predict">预测</div>
    <div class="tab" data-tab="stats">战绩</div>
    <div class="tab" data-tab="archive">归档</div>
  </div>
  <div class="nav-actions">
    <div class="live-dot" id="liveDot" style="display:none"></div>
    <button class="nav-btn" id="searchBtn" title="搜索">🔍</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
    <div class="hero-orb hero-orb-3"></div>
    <div class="hero-noise"></div>
  </div>
  <div class="hero-badge">🏆 FIFA World Cup 2026</div>
  <h1>2026 FIFA 世界杯</h1>
  <p class="hero-sub">美国 · 加拿大 · 墨西哥 · 48支球队 · 104场赛事</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="val" id="daysLeft">--</div><div class="lbl">赛事进度</div></div>
    <div class="hero-stat"><div class="val">48</div><div class="lbl">参赛球队</div></div>
    <div class="hero-stat"><div class="val" id="liveCount">0</div><div class="lbl">今日赛事</div></div>
    <div class="hero-stat"><div class="val">16</div><div class="lbl">举办城市</div></div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <span style="font-size:1rem;color:var(--t3)">🔍</span>
    <input class="search-input" id="searchInput" placeholder="搜索球队、球员、比赛… (快捷键 /)" autocomplete="off">
    <button class="search-close-btn" id="searchCloseBtn">✕</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-empty">输入关键词开始搜索</div>
  </div>
</div>

<!-- SCHEDULE PAGE -->
<div class="page active" id="page-schedule">
  <div class="container">
    <div id="scheduleLoading" class="loading"><div class="spinner"></div><div class="loading-text">加载赛程…</div></div>
    <div id="scheduleError" class="empty" style="display:none">⚠️ 数据加载失败</div>
    <div id="scheduleContent" style="display:none">
      <div id="favSection" class="fav-section" style="display:none">
        <div class="fav-section-header">⭐ 我关注的赛事</div>
        <div id="favMatches"></div>
      </div>
      <div class="section-title">今日赛事</div>
      <div id="todayMatches" class="matches-grid"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════════════════════════════
const CACHE={}, ESPN_BASE='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
let FX=null, TP=null, IDX=null, H2H=null, STANDINGS=null;
let espnScores={};   // keyed by "HOME_CODE-AWAY_CODE"
let favorites=[];
let deferredInstall=null;
const ALL_MATCHES=()=>FX?[...(FX.matches||[]),...(FX.knockout||[])]:[];

// ── TIME HELPERS ──────────────────────────────────────────────
const toBJ=u=>new Date(new Date(u).getTime()+8*3600*1000);
const fmtKey=d=>d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
const fmtTime=u=>{const d=toBJ(u);return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')};
const nowBJ=()=>toBJ(Date.now());
const todayKey=()=>fmtKey(nowBJ());
const espnDate=d=>d.replace(/-/g,'');

// ── FETCH HELPER ──────────────────────────────────────────────
async function gj(path){
  if(CACHE[path]) return CACHE[path];
  try{
    const r=await fetch(path+'?t='+Date.now());
    if(!r.ok) return null;
    const j=await r.json();
    CACHE[path]=j; return j;
  }catch{return null}
}

// ── ESPN LIVE SCORES (client-side) ────────────────────────────
async function fetchESPN(dateStr){
  try{
    const url=`${ESPN_BASE}?dates=${espnDate(dateStr)}`;
    const r=await fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}});
    if(!r.ok) return;
    const d=await r.json();
    let liveCount=0;
    (d.events||[]).forEach(ev=>{
      const comp=ev.competitions?.[0]; if(!comp) return;
      const status=comp.status?.type||{};
      const comps=comp.competitors||[];
      if(comps.length<2) return;
      const home=comps.find(c=>c.homeAway==='home')||comps[0];
      const away=comps.find(c=>c.homeAway==='away')||comps[1];
      const hAbv=(home.team?.abbreviation||'').toUpperCase();
      const aAbv=(away.team?.abbreviation||'').toUpperCase();
      const score=`${home.score||0}-${away.score||0}`;
      const key=`${hAbv}_${aAbv}`;
      const isLive=status.state==='in';
      if(isLive) liveCount++;
      espnScores[key]={score,state:status.state,clock:status.displayClock,period:status.period,completed:status.completed};
    });
    // show live indicator
    if(liveCount>0){
      document.getElementById('liveDot').style.display='block';
    }
    CACHE['espn_'+dateStr]=true;
  }catch(e){/* ESPN unavailable, graceful fallback */}
}

function getESPNScore(m){
  if(!m) return null;
  const hCode=(getTeamByName(m.home)||{}).code||m.home.slice(0,3).toUpperCase();
  const aCode=(getTeamByName(m.away)||{}).code||m.away.slice(0,3).toUpperCase();
  return espnScores[`${hCode}_${aCode}`]||espnScores[`${aCode}_${hCode}`]||null;
}

// ── ESPN TEAM CODE MAPPING ────────────────────────────────────
const ESPN_MAP={
  'KOR':'KOR','CZE':'CZE','BIH':'BIH','CUW':'CUW','CPV':'CPV',
  'KSA':'KSA','IRN':'IRN','IRQ':'IRQ','ALG':'ALG','COD':'COD',
  'UZB':'UZB','GHA':'GHA','PAN':'PAN','PAR':'PAR','HAI':'HTI',
  'ZAF':'RSA','NED':'NED','TUR':'TUR','SUI':'SUI','SCO':'SCO',
};

// ── FAVORITES ─────────────────────────────────────────────────
function loadFavs(){try{favorites=JSON.parse(localStorage.getItem('wc_favs')||'[]')}catch{favorites=[]}}
function saveFavs(){localStorage.setItem('wc_favs',JSON.stringify(favorites))}
function isFav(code){return favorites.includes(code)}
function toggleFav(code,e){
  if(e){e.stopPropagation()}
  const wasAlready=isFav(code);
  if(wasAlready) favorites=favorites.filter(c=>c!==code);
  else favorites.push(code);
  saveFavs();
  if(typeof showToast==='function') showToast(wasAlready?'已取消关注':'⭐ 已添加关注',wasAlready?'info':'success');
  document.querySelectorAll(`[data-fav-code="${code}"]`).forEach(btn=>{
    btn.classList.toggle('active',isFav(code));
    btn.textContent=isFav(code)?'♥':'♡';
  });
  document.querySelectorAll(`[data-team-code="${code}"]`).forEach(card=>{
    card.classList.toggle('favorited',isFav(code));
  });
  renderFavSection();
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  loadFavs();
  // Hero days counter
  const start=new Date('2026-06-11'), end=new Date('2026-07-19'), now=new Date();
  if(now<start){document.getElementById('daysLeft').textContent=Math.ceil((start-now)/86400000)+'天后'}
  else if(now<=end){document.getElementById('daysLeft').textContent='第'+Math.floor((now-start)/86400000+1)+'天'}
  else{document.getElementById('daysLeft').textContent='已结束'}

  // Show skeletons
  showSkeleton();

  // Load all data in parallel
  [FX,TP,IDX,H2H,STANDINGS]=await Promise.all([
    gj('data/fixtures.json'),gj('data/team_profiles.json'),gj('data/index.json'),
    gj('data/h2h.json'),gj('data/standings.json')
  ]);

  if(!FX){
    document.getElementById('scheduleLoading').style.display='none';
    document.getElementById('scheduleError').style.display='block';
    return;
  }

  // Fetch ESPN scores for today + yesterday
  const today=todayKey();
  const yesterday=fmtKey(new Date(Date.now()-86400000+8*3600*1000));
  await Promise.all([fetchESPN(today),fetchESPN(yesterday)]);

  // Count today's matches
  const todayMs=ALL_MATCHES().filter(m=>fmtKey(toBJ(m.utc))===today);
  document.getElementById('liveCount').textContent=todayMs.length;

  hideSkeleton();
  renderSchedule();
  renderGroups();
  renderTeams();
  renderNews();
  renderStats();
  renderArchive();
}

function showSkeleton(){
  document.getElementById('scheduleLoading').style.display='none';
  const sc=document.getElementById('scheduleContent');
  sc.style.display='block';
  document.getElementById('todayMatches').innerHTML=[1,2,3].map(()=>`<div class="skel-match skeleton"></div>`).join('');
  document.getElementById('dateMatches').innerHTML=[1,2].map(()=>`<div class="skel-match skeleton"></div>`).join('');
}
function hideSkeleton(){/* content will be overwritten by renders */}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.tab===t));
  document.querySelectorAll('#bottom-nav .bn-btn').forEach(x=>x.classList.toggle('active', x.dataset.tab===t));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  const pg=document.getElementById('page-'+t);
  pg.classList.add('active');
  if(t==='predict') renderPredict();
  if(t==='stats') renderStats();
  // scroll to top on mobile
  if(window.innerWidth<=640) window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('tabs').addEventListener('click',e=>{
  const tab=e.target.closest('[data-tab]'); if(!tab) return;
  switchTab(tab.dataset.tab);
});
document.getElementById('bottom-nav').addEventListener('click',e=>{
  const btn=e.target.closest('[data-tab]'); if(!btn) return;
  // Haptic-style ripple
  btn.style.transform='scale(.92)';
  setTimeout(()=>btn.style.transform='',120);
  switchTab(btn.dataset.tab);
});

// ── SCHEDULE ──────────────────────────────────────────────────
function renderSchedule(){
  if(!FX) return;
  const all=ALL_MATCHES();
  const today=todayKey();
  const byDate={};
  all.forEach(m=>{const k=fmtKey(toBJ(m.utc));if(!byDate[k])byDate[k]=[];byDate[k].push(m)});
  const todayArr=byDate[today]||[];
  // Fetch today's predictions for mini bars
  gj(`data/predictions/${today}.json`).then(predData=>{
    const getPred=m=>predData?.matches?.find(x=>x.id===m.id||(x.homeCode&&m.home&&(getTeamByName(m.home)||{}).code===x.homeCode));
    document.getElementById('todayMatches').innerHTML=todayArr.length?todayArr.map(m=>matchCardHTML(m,getPred(m))).join(''):'<div class="empty">今日暂无比赛</div>';
    observeReveal(document.getElementById('todayMatches'));
  });
  // Date strip
  const dates=Object.keys(byDate).sort();
  const strip=document.getElementById('dateStrip');
  strip.innerHTML=dates.map(d=>{
    const label=d===today?'今天':d.slice(5).replace('-','/');
    return `<button class="date-btn${d===today?' active today':''}" data-date="${d}">${label}</button>`;
  }).join('');
  strip.addEventListener('click',e=>{
    const btn=e.target.closest('.date-btn'); if(!btn) return;
    strip.querySelectorAll('.date-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    const dateArr=byDate[btn.dataset.date]||[];
    const stripDate=btn.dataset.date;
    Promise.all([fetchESPN(stripDate),gj(`data/predictions/${stripDate}.json`)]).then(([,pd])=>{
      const getPred=m=>pd?.matches?.find(x=>x.id===m.id||(x.homeCode&&(getTeamByName(m.home)||{}).code===x.homeCode));
      const el=document.getElementById('dateMatches');
      el.innerHTML=dateArr.length?dateArr.map(m=>matchCardHTML(m,getPred(m))).join(''):'<div class="empty">该日期无比赛</div>';
      observeReveal(el);
    });
  });
  gj(`data/predictions/${today}.json`).then(predData=>{
    const getPred=m=>predData?.matches?.find(x=>x.id===m.id||(x.homeCode&&m.home&&(getTeamByName(m.home)||{}).code===x.homeCode));
    document.getElementById('dateMatches').innerHTML=todayArr.length?todayArr.map(m=>matchCardHTML(m,getPred(m))).join(''):'<div class="empty">今日暂无比赛</div>';
    observeReveal(document.getElementById('dateMatches'));
  });
  renderFavSection();
}

function renderFavSection(){
  if(!FX) return;
  const el=document.getElementById('favSection');
  const fm=document.getElementById('favMatches');
  if(!favorites.length){el.style.display='none';return}
  const upcoming=ALL_MATCHES().filter(m=>{
    const hCode=(getTeamByName(m.home)||{}).code||'';
    const aCode=(getTeamByName(m.away)||{}).code||'';
    return (isFav(hCode)||isFav(aCode))&&new Date(m.utc)>Date.now()-7200000;
  }).slice(0,6);
  if(!upcoming.length){el.style.display='none';return}
  el.style.display='block';
  fm.innerHTML=upcoming.map(m=>matchCardHTML(m)).join('');
  observeReveal(fm);
}

function matchCardHTML(m,pred){
  const hT=getTeamByName(m.home)||{}, aT=getTeamByName(m.away)||{};
  const hFlag=hT.flag||(FX.teams?.[m.home]?.flag||'🏳️');
  const aFlag=aT.flag||(FX.teams?.[m.away]?.flag||'🏳️');
  const hName=hT.name||m.home, aName=aT.name||m.away;
  const ms=new Date(m.utc).getTime(), now=Date.now();
  const isLive=now>ms&&now<ms+110*60*1000;
  const isDone=now>ms+110*60*1000;
  const espn=getESPNScore(m);
  const scoreVal=m.score||(espn?.score)||(isDone?'- -':fmtTime(m.utc));
  const scoreClass=isLive||espn?.state==='in'?'match-score live-score':'match-score';
  let badge=isLive?'<span class="match-group-badge badge-live">🔴 进行中</span>'
            :isDone?'<span class="match-group-badge badge-done">✓ 已结束</span>'
            :`<span class="match-group-badge">${m.group?'小组 '+m.group:m.round||'淘汰赛'}</span>`;
  if(espn?.state==='in') badge='<span class="match-group-badge badge-live">🔴 '+espn.clock+'</span>';
  const hCode=hT.code||'', aCode=aT.code||'';
  const isFavMatch=isFav(hCode)||isFav(aCode);
  // mini probability bar
  let probBarHTML='';
  if(pred){
    const p5=pred.predictions?.fable5||pred.predictions?.opta||{};
    const h=p5.home||33,d=p5.draw||34,a=p5.away||33;
    probBarHTML=`<div class="match-prob-bar"><div class="mpb-h" style="flex:${h}"></div><div class="mpb-d" style="flex:${d}"></div><div class="mpb-a" style="flex:${a}"></div></div>`;
  }
  return `<div class="match-card${isLive?' live':''}${isFavMatch?' fav-match':''}" onclick="openMatchModal('${m.id}')">
    <div class="team-side">
      <div class="team-flag">${hFlag}</div>
      <div class="team-name">${hName}<span class="sub">${hCode}</span></div>
    </div>
    <div class="match-center">
      <div class="${scoreClass}">${scoreVal}</div>
      <div>${badge}</div>
      ${probBarHTML}
    </div>
    <div class="team-side right">
      <div class="team-flag">${aFlag}</div>
      <div class="team-name">${aName}<span class="sub">${aCode}</span></div>
    </div>
  </div>`;
}

// ── GROUPS ────────────────────────────────────────────────────
function renderGroups(){
  if(!FX) return;
  const el=document.getElementById('groupsContent');
  // Compute standings from match results
  const computed=computeStandings();
  const groups=FX.groups||{};
  el.innerHTML=Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([g,teams])=>{
    const standing=computed[g]||teams.map(t=>({code:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
    standing.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    const rows=standing.map((s,i)=>{
      const tp=getTeamByCode(s.code)||getTeamByName(s.code)||{};
      const flag=tp.flag||'🏳️', name=tp.name||s.code;
      const qualify=i<2?'qualify-line':'';
      const rankEl=i<2?`<span class="rank-qualify">${i+1}</span>`:`<span class="rank-num">${i+1}</span>`;
      return `<tr class="${qualify}">
        <td>${rankEl}<span class="team-row-flag">${flag}</span><span class="team-name-text" onclick="openTeamModal('${s.code}')">${name}</span></td>
        <td>${s.mp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}</td><td>${s.ga}</td>
        <td style="color:${s.gd>0?'var(--green)':s.gd<0?'var(--red)':'var(--t2)'}">${s.gd>0?'+':''}${s.gd}</td>
        <td style="font-weight:800;color:${s.pts>0?'var(--t1)':'var(--t3)'}">${s.pts}</td>
      </tr>`;
    }).join('');
    return `<div class="group-card">
      <div class="group-header"><div class="group-letter">${g}</div><div class="group-title">第${g}组</div></div>
      <table class="group-table">
        <thead><tr><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

function computeStandings(){
  const result={};
  if(!FX) return result;
  const init=code=>({code,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
  ALL_MATCHES().forEach(m=>{
    if(!m.group||!m.score) return;
    const parts=m.score.split('-').map(Number);
    if(parts.length<2||isNaN(parts[0])||isNaN(parts[1])) return;
    const [hg,ag]=parts;
    const g=m.group.replace('组','');
    if(!result[g]) result[g]={};
    const hCode=(getTeamByName(m.home)||{}).code||m.home;
    const aCode=(getTeamByName(m.away)||{}).code||m.away;
    if(!result[g][hCode]) result[g][hCode]=init(hCode);
    if(!result[g][aCode]) result[g][aCode]=init(aCode);
    const h=result[g][hCode], a=result[g][aCode];
    h.mp++;a.mp++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
    h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
    if(hg>ag){h.w++;h.pts+=3;a.l++}
    else if(hg<ag){a.w++;a.pts+=3;h.l++}
    else{h.d++;h.pts++;a.d++;a.pts++}
  });
  const out={};
  Object.entries(result).forEach(([g,teams])=>{out[g]=Object.values(teams)});
  return out;
}

// ── TEAMS ─────────────────────────────────────────────────────
function renderTeams(){
  if(!TP) return;
  const teams=TP.teams||{};
  const confs=[...new Set(Object.values(teams).map(t=>t.confederation).filter(Boolean))].sort();
  const filter=document.getElementById('teamsFilter');
  filter.innerHTML=['全部',...confs].map((c,i)=>
    `<button class="filter-btn${i===0?' active':''}" data-conf="${c}">${c}</button>`
  ).join('');
  filter.addEventListener('click',e=>{
    const btn=e.target.closest('.filter-btn'); if(!btn) return;
    filter.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    renderTeamCards(btn.dataset.conf);
  });
  renderTeamCards('全部');
}

function renderTeamCards(conf){
  const teams=TP?TP.teams:{};
  const grid=document.getElementById('teamsGrid');
  const entries=Object.entries(teams).filter(([,t])=>conf==='全部'||t.confederation===conf)
    .sort(([,a],[,b])=>a.fifaRank-b.fifaRank);
  grid.innerHTML=entries.map(([code,t])=>{
    // Mini form guide — last 5 results placeholder (W/D/L pattern)
    const formMap={BRA:'WWWDW',ARG:'WWDWW',FRA:'WWWWD',ENG:'WDWWW',ESP:'WWWDW',GER:'WDWWW',POR:'WWWDW',NED:'WWDWW',BEL:'WDWDW',URU:'WDWWL',USA:'DWWWL',MEX:'WDWDL',CAN:'DWWDL',MOR:'DDWWL',SEN:'WDWDW',JPN:'WWDLW',KOR:'DWWDL',AUS:'WDLWW',QAT:'LWWLW',SUI:'WWDWL'};
    const form=formMap[code]||'';
    const formDots=form?`<div class="form-dots">${[...form].map(r=>`<div class="form-dot fd-${r==='W'?'w':r==='D'?'d':'l'}"></div>`).join('')}</div>`:'';
    return `<div class="team-card${isFav(code)?' favorited':''}" data-team-code="${code}" onclick="openTeamModal('${code}')">
      <button class="fav-btn${isFav(code)?' active':''}" data-fav-code="${code}" onclick="toggleFav('${code}',event)">${isFav(code)?'♥':'♡'}</button>
      <div class="flag">${t.flag}</div>
      <div class="tname">${t.name}</div>
      <div class="tgroup">小组 ${t.group} · ${t.confederation}</div>
      <div class="trank">FIFA #${t.fifaRank}</div>

// ── H2H ───────────────────────────────────────────────────────
function buildH2H(hCode,aCode,hName,aName){
  if(!H2H) return '';
  const key=[`${hCode}_${aCode}`,`${aCode}_${hCode}`].find(k=>H2H.records?.[k]);
  const rec=key?H2H.records[key]:null;
  if(!rec?.matches?.length) return '';
  const s=rec.summary||{};
  const hw=s[`${hCode}_W`]||s.BRA_W||s.FRA_W||s.GER_W||s.ARG_W||s.ENG_W||s.ESP_W||s.NED_W||s.MEX_W||s.CAN_W||s.USA_W||0;
  const aw=s[`${aCode}_W`]||s.MAR_W||s.SEN_W||s.NED_W||s.CRO_W||s.URU_W||s.COL_W||s.JPN_W||s.KOR_W||s.QAT_W||s.PAR_W||s.ALG_W||0;
  const dr=s.draws||0;
  const total=(hw+aw+dr)||1;
  const matches=rec.matches.slice(-5).reverse().map(r=>`
    <div class="h2h-match">
      <span class="h2h-match-date">${r.date}</span>
      <span class="h2h-match-score">${r.result}</span>
      <span class="h2h-match-comp">${r.comp}</span>
    </div>
    ${r.note?`<div class="h2h-match-note">${r.note}</div>`:''}`).join('');
  return `<div class="h2h-section">
    <div class="tm-section-title">历史交锋</div>
    <div class="h2h-labels">
      <span style="color:var(--blue)">${hName} ${hw}胜</span>
      <span style="color:var(--t3)">${dr}平</span>
      <span style="color:var(--red)">${aw}胜 ${aName}</span>
    </div>
    <div class="h2h-bar">
      <div class="h2h-h-wins" style="flex:${hw||.1}"></div>
      <div class="h2h-draws" style="flex:${dr||.1}"></div>
      <div class="h2h-a-wins" style="flex:${aw||.1}"></div>
    </div>
    <div style="margin-top:10px">${matches}</div>
  </div>`;
}

async function renderStats(){

  document.getElementById('statsCards').innerHTML=[

  ].map(x=>`<div class="stat-box"><div class="sv">${x.v}</div><div class="sl">${x.l}</div></div>`).join('');
  if(!window.Chart){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';

}

function renderChart(stats){
  const ctx=document.getElementById('accuracyChart');
  if(!ctx||!stats.series?.length) return;
  const labels=stats.series.map(x=>x.date.slice(5));
  const f5=stats.series.map(x=>x.fable5Acc||0);
  if(ctx._chart) ctx._chart.destroy();
  ctx._chart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Fable5准确率',data:f5,borderColor:'#f59e0b',tension:.4,fill:true,backgroundColor:'rgba(245,158,11,.08)',pointRadius:4,pointBackgroundColor:'#f59e0b'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{y:{beginAtZero:true,max:100,ticks:{color:'#64748b',callback:v=>v+'%'},grid:{color:'rgba(30,58,95,.4)'}},x:{ticks:{color:'#64748b'},grid:{color:'rgba(30,58,95,.25)'}}}}});
}

// ── ARCHIVE ───────────────────────────────────────────────────
async function renderArchive(){
  const idx=IDX||await gj('data/index.json');
  const el=document.getElementById('archiveList');
  if(!idx?.dates?.length){el.innerHTML='<div class="empty">暂无归档数据</div>';return}
  el.innerHTML=idx.dates.sort((a,b)=>b.localeCompare(a)).map(d=>`
    <div class="archive-item">
      <div class="archive-date" onclick="toggleArchive('${d}')">
        <span>📅 ${d} 预测 & 回顾</span>
        <div class="arc-chevron" id="arc-icon-${d}">▶</div>
      </div>
      <div class="archive-body" id="arc-${d}"></div>
    </div>`).join('');
}

async function toggleArchive(date){
  const body=document.getElementById('arc-'+date);
  const icon=document.getElementById('arc-icon-'+date);
  if(body.classList.contains('open')){body.classList.remove('open');icon.textContent='▶';return}
  body.classList.add('open');icon.textContent='▼';
  if(body.innerHTML.trim()) return;
  body.innerHTML='<div class="loading" style="padding:20px"><div class="spinner"></div></div>';
  const [pred,rev]=await Promise.all([gj(`data/predictions/${date}.json`),gj(`data/reviews/${date}.json`)]);
  let html='';
  if(pred?.matches?.length){
    html+=`<div style="padding:10px 14px;font-size:.75rem;font-weight:700;color:var(--t2)">📋 预测（${pred.matches.length}场）</div>`;
    html+=pred.matches.map(m=>{
      const p5=m.predictions?.fable5||{};
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-top:1px solid var(--gb);font-size:.76rem">
        <span style="color:var(--t1)">${m.home} vs ${m.away}</span>
        <span style="color:var(--gold-l);font-weight:700">${p5.score||'?-?'}</span>
        <span style="color:var(--t3);font-size:.65rem">${p5.home||'-'}/${p5.draw||'-'}/${p5.away||'-'}%</span>
      </div>`;}).join('');
  }
  if(rev?.results?.length){
    html+=`<div style="padding:10px 14px;font-size:.75rem;font-weight:700;color:var(--t2)">📝 回顾（${rev.results.length}场）</div>`;
    html+=rev.results.map(r=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-top:1px solid var(--gb);font-size:.76rem">
        <span style="color:var(--t1)">${r.home} vs ${r.away}</span>
        <span style="color:var(--t1);font-weight:700">${r.actual||'?'}</span>
        <span style="color:${r.correct?'var(--green)':'var(--red)'}">${r.correct?'✓ 命中':'✗ 未中'}</span>
      </div>`).join('');
  }
  if(!html) html='<div class="empty" style="padding:20px">该日期暂无数据</div>';
  body.innerHTML=html;
}

// ── SEARCH ────────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click',()=>openSearch());
document.getElementById('searchCloseBtn').addEventListener('click',()=>closeSearch());
document.getElementById('searchInput').addEventListener('input',e=>doSearch(e.target.value));
document.addEventListener('keydown',e=>{
  if(e.key==='/') {e.preventDefault();openSearch();}
  if(e.key==='Escape'){closeSearch();document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));}
});

function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),50);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='<div class="search-empty">输入关键词开始搜索</div>';
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!q||q.length<1){el.innerHTML='<div class="search-empty">输入关键词开始搜索</div>';return}
  const results=[];
  // Search teams
  if(TP){
    Object.entries(TP.teams).forEach(([code,t])=>{
      if(t.name.includes(q)||t.nameEn.toLowerCase().includes(q)||(t.keyPlayers||[]).some(p=>p.name.toLowerCase().includes(q))||(t.coach||'').toLowerCase().includes(q)){
        const matchedPlayer=(t.keyPlayers||[]).find(p=>p.name.toLowerCase().includes(q));
        results.push({type:'team',icon:t.flag,title:t.name,sub:matchedPlayer?`球员: ${matchedPlayer.name} · ${matchedPlayer.club}`:`FIFA #${t.fifaRank} · 小组${t.group}`,action:()=>{closeSearch();openTeamModal(code)}});
      }
    });
  }
  // Search matches
  if(FX){
    ALL_MATCHES().forEach(m=>{
      const hT=getTeamByName(m.home)||{}, aT=getTeamByName(m.away)||{};
      const hName=hT.name||m.home, aName=aT.name||m.away;
      if(hName.toLowerCase().includes(q)||aName.toLowerCase().includes(q)||m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)||fmtKey(toBJ(m.utc)).includes(q)){
        const bjDate=fmtKey(toBJ(m.utc));
        results.push({type:'match',icon:'⚽',title:`${hName} vs ${aName}`,sub:`${bjDate} ${fmtTime(m.utc)} · ${m.venue||''}`,action:()=>{closeSearch();openMatchModal(m.id)}});
      }
    });
  }
  if(!results.length){el.innerHTML='<div class="search-empty">未找到相关结果</div>';return}
  el.innerHTML=results.slice(0,20).map(r=>`
    <div class="search-result-item" onclick="(${r.action.toString()})()">
      <div class="sr-icon">${r.icon}</div>
      <div class="sr-main"><div class="sr-title">${r.title}</div><div class="sr-sub">${r.sub}</div></div>
      <div class="sr-type">${r.type==='team'?'球队':'赛程'}</div>
    </div>`).join('');
}

// ── MODAL HELPERS ─────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))closeModal(e.target.id)});

// ── UTILS ─────────────────────────────────────────────────────
function getTeamByCode(code){return TP?TP.teams[code]||null:null}
function getTeamByName(name){
  if(!TP) return null;
  return Object.values(TP.teams).find(t=>t.nameEn===name||t.name===name||t.nameEn?.toLowerCase()===name?.toLowerCase())||null;
}

// ── PWA ───────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredInstall=e;
  setTimeout(()=>document.getElementById('installBanner').classList.add('show'),3000);
});
document.getElementById('installBtn').addEventListener('click',()=>{
  if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.then(()=>{deferredInstall=null;document.getElementById('installBanner').classList.remove('show')})}
});
document.getElementById('installClose').addEventListener('click',()=>document.getElementById('installBanner').classList.remove('show'));

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── BOOT ──────────────────────────────────────────────────────

// ── TOAST NOTIFICATION ───────────────────────────────────────
const toastEl=document.createElement('div');toastEl.id='toast-container';document.body.appendChild(toastEl);
function showToast(msg,type='info',dur=2500){
  const t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;
  toastEl.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},dur);
}

// ── INTERSECTION OBSERVER — SCROLL REVEAL ────────────────────
const _ro=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');_ro.unobserve(e.target)}});
},{threshold:.08,rootMargin:'0px 0px -30px 0px'});
function observeReveal(root=document){
  root.querySelectorAll('.match-card,.team-card,.group-card,.news-card,.pred-card,.stat-box,.archive-item,.player-row').forEach((el,i)=>{
    el.classList.add('reveal');
    if(i<4) el.classList.add('reveal-d'+(i+1));
    _ro.observe(el);
  });
}
// Re-observe after dynamic renders
const _origInnerHTML=Object.getOwnPropertyDescriptor(Element.prototype,'innerHTML');
// Instead, call observeReveal after each render via a MutationObserver on containers
const _mutObs=new MutationObserver(()=>{observeReveal()});
['todayMatches','dateMatches','teamsGrid','newsGrid','groupsContent','predictContent','statsCards','archiveList'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) _mutObs.observe(el,{childList:true,subtree:false});
});

init();
</script>
