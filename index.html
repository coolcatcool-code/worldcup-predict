<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯2026 概率预测站</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#2f81f7;--green:#3fb950;--red:#f85149;--gold:#d29922}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
.wrap{max-width:980px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 8px}
header h1{font-size:1.5rem}
header p{color:var(--muted);font-size:.85rem}
nav{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:20px;cursor:pointer;font-size:.95rem}
nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.match-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.match-title{font-size:1.15rem;font-weight:600}
.match-meta{color:var(--muted);font-size:.8rem}
table{width:100%;border-collapse:collapse;font-size:.9rem;margin:10px 0}
th,td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500}
td:first-child,th:first-child{text-align:left}
.src-fable{color:var(--gold);font-weight:600}
.bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:4px 0 12px}
.bar .h{background:var(--accent)}.bar .d{background:var(--muted)}.bar .a{background:var(--red)}
.analysis{font-size:.88rem;color:var(--muted);border-left:3px solid var(--accent);padding-left:10px;margin-top:8px}
.risk{font-size:.82rem;color:var(--gold);margin-top:6px}
.score-pill{display:inline-block;background:rgba(47,129,247,.15);color:var(--accent);border-radius:6px;padding:1px 8px;font-weight:600}
.hit{color:var(--green);font-weight:600}.miss{color:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-box .num{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-box .lbl{color:var(--muted);font-size:.8rem}
.archive-item{display:flex;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.archive-item:hover{color:var(--accent)}
footer{text-align:center;color:var(--muted);font-size:.75rem;padding:24px 0;border-top:1px solid var(--border);margin-top:24px}
.empty{text-align:center;color:var(--muted);padding:40px 0}
select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
canvas{max-height:320px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>⚽ 世界杯2026 概率预测站</h1>
  <p>Fable 5 独立预测 · Opta模型 · 博彩市场 三方对照与长期跟踪</p>
</header>
<nav>
  <button data-tab="today" class="active">今日预测</button>
  <button data-tab="review">赛果回顾</button>
  <button data-tab="stats">战绩统计</button>
  <button data-tab="archive">归档</button>
</nav>
<main id="content"><div class="empty">加载中…</div></main>
<footer>本站内容为数据分析展示，仅供参考，不构成任何投注建议。<br>预测由 Claude Fable 5 每日自动生成 · 数据来源：Opta Analyst、各大博彩市场公开赔率</footer>
</div>
<script>
const $=s=>document.querySelector(s);
let INDEX=null,CACHE={};
async function getJSON(p){if(CACHE[p])return CACHE[p];try{const r=await fetch(p+'?t='+Date.now());if(!r.ok)return null;const j=await r.json();CACHE[p]=j;return j}catch(e){return null}}
async function init(){INDEX=await getJSON('data/index.json')||{dates:[]};render('today')}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render(b.dataset.tab)});

function probRow(name,p,cls){return `<tr><td class="${cls||''}">${name}</td><td>${p.home}%</td><td>${p.draw}%</td><td>${p.away}%</td><td>${p.score?`<span class="score-pill">${p.score}</span>${p.altScore?' <small style="color:var(--muted)">次选'+p.altScore+'</small>':''}`:'—'}</td></tr>`}
function matchCard(m,review){
  let res='';
  if(review){const r=review;res=`<div style="margin-top:8px;font-size:.95rem">实际比分：<span class="score-pill">${r.actualScore}</span>　方向 <span class="${r.fable5.outcomeHit?'hit':'miss'}">${r.fable5.outcomeHit?'命中 ✓':'未中 ✗'}</span>　比分 <span class="${r.fable5.scoreHit?'hit':'miss'}">${r.fable5.scoreHit?'命中 ✓':'未中 ✗'}</span>　单场Brier ${r.fable5.brier.toFixed(3)}</div>`}
  const f=m.predictions.fable5;
  return `<div class="card">
  <div class="match-head"><span class="match-title">${m.home} vs ${m.away}</span><span class="match-meta">${m.group} · ${m.venue} · ${new Date(m.kickoffBeijing).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}（北京时间）</span></div>
  <div class="bar"><div class="h" style="width:${f.home}%"></div><div class="d" style="width:${f.draw}%"></div><div class="a" style="width:${f.away}%"></div></div>
  <table><tr><th>来源</th><th>主胜</th><th>平</th><th>客胜</th><th>比分预测</th></tr>
  ${probRow('Fable 5预测',f,'src-fable')}${probRow('Opta模型',m.predictions.opta)}${probRow('博彩市场',m.predictions.market)}</table>
  <div class="analysis">${m.analysis}</div>
  <div class="risk">⚠ 关键变数：${m.keyRisk}</div>${res}</div>`}

async function render(tab){
  const c=$('#content');c.innerHTML='<div class="empty">加载中…</div>';
  const dates=[...(INDEX.dates||[])].sort().reverse();
  if(tab==='today'){
    const d=dates[0];if(!d){c.innerHTML='<div class="empty">暂无预测数据</div>';return}
    const data=await getJSON(`data/predictions/${d}.json`);
    if(!data){c.innerHTML='<div class="empty">暂无预测数据</div>';return}
    c.innerHTML=`<p style="color:var(--muted);font-size:.85rem;margin-bottom:10px">预测日期：${data.date}（覆盖当晚至次日中午场次）· 生成于 ${new Date(data.generatedAt).toLocaleString('zh-CN')}</p>`+data.matches.map(m=>matchCard(m)).join('');
  }
  if(tab==='review'){
    let html='',found=false;
    for(const d of dates){
      const rev=await getJSON(`data/reviews/${d}.json`);if(!rev)continue;
      const pred=await getJSON(`data/predictions/${d}.json`);if(!pred)continue;found=true;
      html+=`<h3 style="margin:14px 0 8px">${d}</h3>`+pred.matches.map(m=>{const r=(rev.matches||[]).find(x=>x.id===m.id);return matchCard(m,r)}).join('');
    }
    c.innerHTML=found?html:'<div class="empty">暂无回顾数据（比赛结束后次日13:00自动生成）</div>';
  }
  if(tab==='stats'){
    const s=await getJSON('data/stats.json');
    if(!s||!s.totals.matches){c.innerHTML='<div class="empty">累计数据不足，完成首轮回顾后展示</div>';return}
    const t=s.totals,n=t.matches;
    const pct=x=>n?(100*x/n).toFixed(1)+'%':'—';
    c.innerHTML=`<div class="stat-grid">
      <div class="stat-box"><div class="num">${n}</div><div class="lbl">已回顾场次</div></div>
      <div class="stat-box"><div class="num">${pct(t.fable5.outcomeHits)}</div><div class="lbl">Fable 5 方向命中率</div></div>
      <div class="stat-box"><div class="num">${pct(t.fable5.scoreHits)}</div><div class="lbl">Fable 5 比分命中率</div></div>
      <div class="stat-box"><div class="num">${(t.fable5.brierSum/n).toFixed(3)}</div><div class="lbl">Fable 5 平均Brier（越低越好）</div></div></div>
    <div class="card"><table><tr><th>来源</th><th>方向命中率</th><th>比分命中率</th><th>平均Brier</th></tr>
      <tr><td class="src-fable">Fable 5</td><td>${pct(t.fable5.outcomeHits)}</td><td>${pct(t.fable5.scoreHits)}</td><td>${(t.fable5.brierSum/n).toFixed(3)}</td></tr>
      <tr><td>Opta模型</td><td>${pct(t.opta.outcomeHits)}</td><td>—</td><td>${(t.opta.brierSum/n).toFixed(3)}</td></tr>
      <tr><td>博彩市场</td><td>${pct(t.market.outcomeHits)}</td><td>—</td><td>${(t.market.brierSum/n).toFixed(3)}</td></tr></table></div>
    <div class="card"><canvas id="brierChart"></canvas></div>`;
    const sr=s.series||[];
    new Chart($('#brierChart'),{type:'line',data:{labels:sr.map(x=>x.date),datasets:[
      {label:'Fable 5 累计平均Brier',data:sr.map(x=>x.fable5),borderColor:'#d29922',tension:.3},
      {label:'Opta',data:sr.map(x=>x.opta),borderColor:'#2f81f7',tension:.3},
      {label:'市场',data:sr.map(x=>x.market),borderColor:'#f85149',tension:.3}]},
      options:{plugins:{legend:{labels:{color:'#e6edf3'}}},scales:{x:{ticks:{color:'#8b949e'}},y:{ticks:{color:'#8b949e'}}}}});
  }
  if(tab==='archive'){
    if(!dates.length){c.innerHTML='<div class="empty">暂无归档</div>';return}
    c.innerHTML='<div class="card">'+dates.map(d=>`<div class="archive-item" data-d="${d}"><span>${d} 预测</span><span>›</span></div>`).join('')+'</div><div id="arc"></div>';
    document.querySelectorAll('.archive-item').forEach(el=>el.onclick=async()=>{
      const data=await getJSON(`data/predictions/${el.dataset.d}.json`);
      $('#arc').innerHTML=data?data.matches.map(m=>matchCard(m)).join(''):'';
      $('#arc').scrollIntoView({behavior:'smooth'});});
  }
}
init();
</script>
</body>
</html>
