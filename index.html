<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界杯 2026 · 预测站</title>
<!-- Chart.js loaded on demand to avoid render-blocking -->
<style>
/* ─── Design Tokens ─── */
:root{
  --bg:#080c14;--surface:#0f1623;--card:#141d2e;--card2:#1a2438;
  --border:#1e2d45;--border2:#243450;
  --text:#e8eef8;--muted:#6b7fa0;--faint:#3a4a65;
  --gold:#f0c040;--gold2:#d4a820;
  --blue:#3d8ef0;--blue2:#2570d0;
  --green:#34c972;--red:#f05060;--orange:#f08030;
  --conf-UEFA:#3d8ef0;--conf-CONMEBOL:#34c972;--conf-CAF:#f0c040;
  --conf-AFC:#e05080;--conf-CONCACAF:#a060f0;--conf-OFC:#40c0d0;
  --r:10px;--r-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --glow:0 0 20px rgba(61,142,240,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── Top Nav ─── */
#topnav{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;padding:0 20px;height:54px}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;margin-right:28px;color:var(--gold)}
.nav-logo span{font-size:1.4rem}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 16px;border:none;background:none;color:var(--muted);font-size:.9rem;white-space:nowrap;border-radius:var(--r-sm);transition:all .2s}
.nav-tab:hover{color:var(--text);background:var(--border)}
.nav-tab.active{color:var(--gold);background:rgba(240,192,64,.1);font-weight:600}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px}
#clockDisplay{font-size:.8rem;color:var(--muted);font-variant-numeric:tabular-nums;min-width:80px;text-align:right}

/* ─── Hero ─── */
#hero{background:linear-gradient(160deg,#0d1a35 0%,#081020 50%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:28px 20px 24px;position:relative;overflow:hidden}
#hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 70% 50%,rgba(61,142,240,.08) 0%,transparent 70%)}
.hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-title{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:800;letter-spacing:-.5px;line-height:1.2}
.hero-title em{color:var(--gold);font-style:normal}
.hero-sub{color:var(--muted);font-size:.88rem;margin-top:4px}
.hero-countdown{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.countdown-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 14px;text-align:center;min-width:62px}
.countdown-box .num{font-size:1.5rem;font-weight:700;color:var(--gold);line-height:1}
.countdown-box .lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.hero-today{margin-top:20px}
.hero-today-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.today-matches{display:flex;gap:10px;flex-wrap:wrap}

/* ─── Live badge ─── */
.live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(240,80,96,.15);color:var(--red);border:1px solid rgba(240,80,96,.3);border-radius:20px;padding:2px 8px;font-size:.72rem;font-weight:700}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ─── Match Pill (hero) ─── */
.match-pill{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:200px;transition:border-color .2s;cursor:pointer}
.match-pill:hover{border-color:var(--border2)}
.match-pill.live-match{border-color:rgba(240,80,96,.4);box-shadow:0 0 12px rgba(240,80,96,.15)}
.pill-teams{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:600}
.pill-flag{font-size:1.1rem}
.pill-vs{color:var(--muted);font-size:.75rem;font-weight:400}
.pill-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.pill-score{background:var(--card2);border-radius:var(--r-sm);padding:2px 8px;font-weight:700;font-size:.9rem;color:var(--gold)}

/* ─── Main Layout ─── */
#app{max-width:1100px;margin:0 auto;padding:20px}

/* ─── Page ─── */
.page{display:none}
.page.active{display:block}

/* ─── Section title ─── */
.sec-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ─── View Switcher ─── */
.view-switch{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.view-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:.82rem;transition:all .2s}
.view-btn.active{background:rgba(61,142,240,.15);border-color:var(--blue);color:var(--blue);font-weight:600}

/* ─── Date Strip ─── */
.date-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:16px}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.date-chip:hover{border-color:var(--border2);color:var(--text)}
.date-chip.active{background:rgba(61,142,240,.15);border-color:var(--blue);color:var(--blue);font-weight:600}
.date-chip .dc-day{font-weight:700;font-size:.85rem}
.date-chip .dc-sub{font-size:.68rem;opacity:.7}

/* ─── Match Card ─── */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;transition:border-color .2s,transform .15s;cursor:pointer;position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2);transition:background .2s}
.match-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.match-card:hover::before{background:var(--blue)}
.match-card.has-prediction::before{background:var(--gold)}
.match-card.live-match{border-color:rgba(240,80,96,.4)}
.match-card.live-match::before{background:var(--red)}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.mc-meta{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mc-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:.68rem;font-weight:600}
.group-badge{background:rgba(61,142,240,.15);color:var(--blue);border:1px solid rgba(61,142,240,.25)}
.stage-badge{background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.25)}
.mc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.mc-team{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px}
.mc-team.home{align-items:flex-start;text-align:left}
.mc-team.away{align-items:flex-end;text-align:right}
.mc-flag{font-size:2rem;line-height:1}
.mc-name{font-weight:600;font-size:.9rem}
.mc-conf{font-size:.65rem;color:var(--muted)}
.mc-center{display:flex;flex-direction:column;align-items:center;gap:4px}
.mc-score{font-size:1.3rem;font-weight:800;color:var(--gold);letter-spacing:2px;min-width:70px;text-align:center}
.mc-time{font-size:.78rem;color:var(--muted)}
.mc-venue{font-size:.7rem;color:var(--faint);margin-top:8px;text-align:center}
/* prediction preview inside card */
.mc-pred{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center}
.pred-bar{flex:1;height:6px;border-radius:3px;overflow:hidden;display:flex}
.pred-bar .ph{background:var(--blue)}.pred-bar .pd{background:var(--faint)}.pred-bar .pa{background:var(--red)}
.pred-label{font-size:.72rem;color:var(--muted);white-space:nowrap}
.pred-score{font-size:.78rem;color:var(--gold);font-weight:600;white-space:nowrap}

/* ─── Group Grid ─── */
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.group-header{background:rgba(61,142,240,.1);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px}
.group-letter{font-size:1.2rem;font-weight:800;color:var(--blue)}
.group-subtitle{font-size:.72rem;color:var(--muted)}
.group-table{width:100%;border-collapse:collapse;font-size:.82rem}
.group-table th{padding:4px 10px;text-align:center;color:var(--faint);font-weight:500;font-size:.68rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
.group-table th:first-child{text-align:left}
.group-table td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:center}
.group-table td:first-child{text-align:left}
.group-table tr:last-child td{border-bottom:none}
.group-table .team-cell{display:flex;align-items:center;gap:6p
