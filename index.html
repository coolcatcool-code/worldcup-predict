<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026世界杯综合平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2d40;
  --card:#141e2e;--card2:#1c2840;
  --accent:#f59e0b;--accent2:#3b82f6;--accent3:#10b981;--accent4:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:#1e3a5f;--border2:#2d4a6a;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
.nav{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:1.1rem;font-weight:700;color:var(--accent);padding:14px 0;white-space:nowrap}
.nav-logo span{color:var(--text2);font-weight:400;font-size:.85rem;margin-left:6px}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 14px;cursor:pointer;color:var(--text2);font-size:.85rem;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* HERO */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);padding:24px 16px;text-align:center}
.hero h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero p{color:var(--text2);font-size:.85rem}
.hero-stats{display:flex;justify-content:center;gap:24px;margin-top:14px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .val{font-size:1.4rem;font-weight:700;color:var(--accent)}
.hero-stat .lbl{font-size:.72rem;color:var(--text3);margin-top:2px}

/* CONTAINER */
.container{max-width:1200px;margin:0 auto;padding:16px}

/* SECTION TITLE */
.section-title{font-size:1rem;font-weight:700;color:var(--text);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:4px;height:18px;background:var(--accent);border-radius:2px}

/* DATE STRIP */
.date-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:.8rem;white-space:nowrap;transition:.2s;user-select:none}
.date-btn:hover{border-color:var(--accent2);color:var(--text)}
.date-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}
.date-btn.today{border-color:var(--accent)}

/* MATCH CARD */
.matches-grid{display:flex;flex-direction:column;gap:10px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:.2s;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.match-card:hover{border-color:var(--accent2);background:var(--card2);transform:translateY(-1px);box-shadow:var(--shadow)}
.match-card.live{border-color:#ef4444;animation:pulse-border 2s infinite}
@keyframes pulse-border{0%,100%{border-color:#ef4444}50%{border-color:#7f1d1d}}
.team-side{display:flex;align-items:center;gap:10px}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:1.8rem;line-height:1}
.team-name{font-size:.9rem;font-weight:600;color:var(--text)}
.team-name .sub{font-size:.72rem;color:var(--text3);font-weight:400;display:block}
.match-center{text-align:center;min-width:80px}
.match-score{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:2px}
.match-time{font-size:.75rem;color:var(--text2)}
.match-meta{font-size:.68rem;color:var(--text3);margin-top:2px}
.match-group-badge{display:inline-block;padding:2px 7px;border-radius:10px;background:rgba(59,130,246,.15);color:var(--accent2);font-size:.68rem;border:1px solid rgba(59,130,246,.3)}
.badge-live{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3)}
.badge-done{background:rgba(16,185,129,.1);color:var(--accent3);border-color:rgba(16,185,129,.2)}

/* GROUP GRID */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.group-header{background:linear-gradient(135deg,var(--bg3),var(--bg4));padding:10px 14px;font-weight:700;font-size:.9rem;color:var(--accent);border-bottom:1px solid var(--border)}
.group-table{width:100%;border-collapse:collapse}
.group-table th{font-size:.68rem;color:var(--text3);padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.group-table th:first-child{text-align:left}
.group-table td{font-size:.8rem;padding:7px 8px;text-align:center;border-bottom:1px solid rgba(30,58,95,.4)}
.group-table td:first-child{text-align:left;display:flex;align-items:center;gap:6px;cursor:pointer}
.group-table td:first-child:hover .team-name-text{color:var(--accent2);text-decoration:underline}
.group-table tr:last-child td{border-bottom:none}
.rank-num{font-size:.7rem;color:var(--text3);width:14px}

/* TEAM CARDS */
.teams-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:.78rem;transition:.2s;user-select:none}
.filter-btn:hover{border-color:var(--accent2);color:var(--text)}
.filter-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.2s;text-align:center}
.team-card:hover{border-color:var(--accent2);background:var(--card2);transform:translateY(-2px);box-shadow:var(--shadow)}
.team-card .flag{font-size:2.4rem;margin-bottom:8px}
.team-card .tname{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:4px}
.team-card .tgroup{font-size:.72rem;color:var(--text2);margin-bottom:6px}
.team-card .trank{font-size:.72rem;color:var(--accent);font-weight:600}
.team-card .tcoach{font-size:.7rem;color:var(--text3);margin-top:2px}
.team-card .tstar{font-size:.72rem;color:var(--accent3);margin-top:4px}

/* PREDICT */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.pred-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pred-header{background:var(--bg3);padding:12px 16px;border-bottom:1px solid var(--border)}
.pred-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pred-team{text-align:center;flex:1}
.pred-flag{font-size:1.6rem}
.pred-name{font-size:.8rem;font-weight:600;margin-top:4px}
.pred-vs{font-size:.9rem;color:var(--text3);font-weight:700}
.pred-time{font-size:.72rem;color:var(--text3);text-align:center}
.pred-body{padding:12px 16px}
.pred-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.8rem}
.pred-label{color:var(--text3);font-size:.72rem}
.pred-bars{display:flex;gap:4px;height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
.pred-bar-h{background:#3b82f6;transition:.8s}
.pred-bar-d{background:#6b7280;transition:.8s}
.pred-bar-a{background:#ef4444;transition:.8s}
.pred-probs{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:10px}
.pred-score{text-align:center;font-size:1.1rem;font-weight:700;color:var(--accent);padding:8px;background:rgba(245,158,11,.08);border-radius:8px;border:1px solid rgba(245,158,11,.2)}
.pred-analysis{font-size:.75rem;color:var(--text2);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-box .sv{font-size:1.8rem;font-weight:800;color:var(--accent)}
.stat-box .sl{font-size:.75rem;color:var(--text3);margin-top:4px}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.chart-wrap h3{font-size:.85rem;color:var(--text2);margin-bottom:12px}

/* NEWS */
.news-grid{display:flex;flex-direction:column;gap:12px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s}
.news-card:hover{border-color:var(--accent2);background:var(--card2)}
.news-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;margin-bottom:8px}
.tag-predict{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.3)}
.tag-review{background:rgba(16,185,129,.1);color:var(--accent3);border:1px solid rgba(16,185,129,.2)}
.tag-news{background:rgba(245,158,11,.1);color:var(--accent);border:1px solid rgba(245,158,11,.2)}
.news-title{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4}
.news-excerpt{font-size:.78rem;color:var(--text2);line-height:1.5}
.news-footer{display:flex;justify-content:space-between;margin-top:10px;font-size:.7rem;color:var(--text3)}

/* ARCHIVE */
.archive-list{display:flex;flex-direction:column;gap:10px}
.archive-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.archive-date{background:var(--bg3);padding:10px 14px;font-size:.85rem;font-weight:600;color:var(--accent2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.archive-body{display:none;padding:12px 14px}
.archive-body.open{display:block}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:660px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-close{position:sticky;top:0;background:var(--bg2);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:1}
.modal-close h2{font-size:1rem;font-weight:700;color:var(--text)}
.modal-close button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-close button:hover{background:var(--accent4);color:#fff}
.modal-body{padding:16px}

/* TEAM MODAL */
.team-modal-hero{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:14px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border-radius:10px;border:1px solid var(--border)}
.team-modal-flag{font-size:3.5rem}
.team-modal-info h3{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:4px}
.team-modal-info p{font-size:.8rem;color:var(--text2);margin-bottom:2px}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.modal-meta-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.modal-meta-item .label{font-size:.68rem;color:var(--text3);margin-bottom:3px}
.modal-meta-item .value{font-size:.85rem;font-weight:600;color:var(--text)}
.players-list{display:flex;flex-direction:column;gap:8px}
.player-row{display:flex;align-items:center;gap:12px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.player-pos{width:28px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.pos-fw{background:rgba(239,68,68,.2);color:#f87171}
.pos-mf{background:rgba(59,130,246,.2);color:#60a5fa}
.pos-df{background:rgba(16,185,129,.2);color:#34d399}
.pos-gk{background:rgba(245,158,11,.2);color:#fbbf24}
.player-name{font-size:.85rem;font-weight:600;color:var(--text);flex:1}
.player-club{font-size:.72rem;color:var(--text3)}
.star-badge{font-size:.65rem;background:rgba(245,158,11,.2);color:var(--accent);border:1px solid rgba(245,158,11,.3);padding:1px 5px;border-radius:8px;flex-shrink:0}

/* MATCH MODAL */
.match-modal-hero{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;text-align:center;padding:16px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border-radius:10px;margin-bottom:14px;border:1px solid var(--border)}
.match-modal-team{display:flex;flex-direction:column;align-items:center;gap:6px}
.match-modal-flag{font-size:3rem}
.match-modal-name{font-size:.9rem;font-weight:700}
.match-modal-score{font-size:2.2rem;font-weight:900;color:var(--accent);white-space:nowrap}
.match-modal-time{font-size:.78rem;color:var(--text2)}
.odds-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.odds-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.odds-box .ol{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.odds-box .ov{font-size:1rem;font-weight:700;color:var(--accent)}
.prob-bar-wrap{margin-bottom:14px}
.prob-bar-wrap .label{font-size:.75rem;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.prob-bar{height:10px;border-radius:5px;display:flex;overflow:hidden;gap:2px}
.analysis-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:.8rem;color:var(--text2);line-height:1.6}
.analysis-box h4{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:6px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:20px;text-align:center;color:#fca5a5;margin:20px 0}
.error-box button{margin-top:10px;padding:8px 20px;background:var(--accent4);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--text3);font-size:.85rem}

/* RESPONSIVE */
@media(max-width:600px){
  .match-card{grid-template-columns:1fr auto 1fr;gap:6px}
  .team-flag{font-size:1.4rem}
  .team-name{font-size:.78rem}
  .match-score{font-size:1.1rem}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .groups-grid{grid-template-columns:1fr}
  .hero h1{font-size:1.3rem}
}

/* page panels */
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">⚽ 世界杯2026 <span>综合平台</span></div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="schedule">赛程</div>
    <div class="tab" data-tab="groups">小组</div>
    <div class="tab" data-tab="teams">球队</div>
    <div class="tab" data-tab="news">资讯</div>
    <div class="tab" data-tab="predict">预测</div>
    <div class="tab" data-tab="stats">战绩</div>
    <div class="tab" data-tab="archive">归档</div>
  </div>
</nav>

<div class="hero" id="heroSection">
  <h1>🏆 2026 FIFA 世界杯</h1>
  <p>美国 · 加拿大 · 墨西哥 | 2026年6月11日 – 7月19日</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="val">48</div><div class="lbl">参赛球队</div></div>
    <div class="hero-stat"><div class="val">104</div><div class="lbl">场比赛</div></div>
    <div class="hero-stat"><div class="val">16</div><div class="lbl">场馆</div></div>
    <div class="hero-stat"><div class="val" id="daysLeft">-</div><div class="lbl">赛事天数</div></div>
  </div>
</div>

<div class="container">

<!-- SCHEDULE PAGE -->
<div class="page active" id="page-schedule">
  <div id="scheduleLoading" class="loading"><div class="spinner"></div><span>加载赛程...</span></div>
  <div id="scheduleContent" style="display:none">
    <div class="section-title">今日焦点</div>
    <div id="todayMatches" class="matches-grid" style="margin-bottom:20px"></div>
    <div class="section-title">按日期查看</div>
    <div class="date-strip" id="dateStrip"></div>
    <div id="dateMatchesContainer" style="margin-top:12px">
      <div class="matches-grid" id="dateMatches"></div>
    </div>
  </div>
  <div id="scheduleError" class="error-box" style="display:none">
    <p>加载失败，请检查网络连接</p>
    <button onclick="init()">重新加载</button>
  </div>
</div>

<!-- GROUPS PAGE -->
<div class="page" id="page-groups">
  <div id="groupsContent" class="groups-grid" style="margin-top:8px"></div>
</div>

<!-- TEAMS PAGE -->
<div class="page" id="page-teams">
  <div class="teams-filter" id="teamsFilter"></div>
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<!-- NEWS PAGE -->
<div class="page" id="page-news">
  <div class="news-grid" id="newsGrid">
    <div class="loading"><div class="spinner"></div><span>加载资讯...</span></div>
  </div>
</div>

<!-- PREDICT PAGE -->
<div class="page" id="page-predict">
  <div id="predictLoading" class="loading"><div class="spinner"></div><span>加载预测...</span></div>
  <div id="predictContent" style="display:none"></div>
  <div id="predictEmpty" class="empty" style="display:none">今日暂无预测数据</div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div id="statsContent">
    <div class="stats-grid" id="statsCards"></div>
    <div class="chart-wrap"><h3>📊 预测准确率趋势</h3><canvas id="accuracyChart" height="160"></canvas></div>
  </div>
</div>

<!-- ARCHIVE PAGE -->
<div class="page" id="page-archive">
  <div class="archive-list" id="archiveList">
    <div class="loading"><div class="spinner"></div><span>加载归档...</span></div>
  </div>
</div>

</div><!-- /container -->

<!-- TEAM MODAL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal">
    <div class="modal-close">
      <h2 id="teamModalTitle">球队详情</h2>
      <button onclick="closeModal('teamModal')">✕</button>
    </div>
    <div class="modal-body" id="teamModalBody"></div>
  </div>
</div>

<!-- MATCH MODAL -->
<div class="modal-overlay" id="matchModal">
  <div class="modal">
    <div class="modal-close">
      <h2 id="matchModalTitle">赛事详情</h2>
      <button onclick="closeModal('matchModal')">✕</button>
    </div>
    <div class="modal-body" id="matchModalBody"></div>
  </div>
</div>

<!-- NEWS MODAL -->
<div class="modal-overlay" id="newsModal">
  <div class="modal">
    <div class="modal-close">
      <h2 id="newsModalTitle">资讯详情</h2>
      <button onclick="closeModal('newsModal')">✕</button>
    </div>
    <div class="modal-body" id="newsModalBody" style="font-size:.85rem;line-height:1.7;color:var(--text2)"></div>
  </div>
</div>

<script>
// ─── GLOBALS ───────────────────────────────────────────────────────────────
const BASE = location.hostname === 'localhost' ? '' : '';
const CACHE = {};
let FX = null, TP = null, IDX = null;
let currentTab = 'schedule';
let currentDateStr = null;

function toBeijing(u){ return new Date(new Date(u).getTime() + 8*3600*1000); }
function fmtKey(d){ return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function fmtTime(u){ const d=toBeijing(u); return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }
function nowBJ(){ return toBeijing(Date.now()); }
function todayKey(){ return fmtKey(nowBJ()); }

async function gj(path){
  if(CACHE[path]) return CACHE[path];
  try{
    const r = await fetch(path+'?t='+Date.now());
    if(!r.ok) return null;
    const j = await r.json();
    CACHE[path] = j;
    return j;
  } catch(e){ return null; }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('scheduleError').style.display='none';
  document.getElementById('scheduleLoading').style.display='flex';
  document.getElementById('scheduleContent').style.display='none';

  // hero days count
  const start = new Date('2026-06-11');
  const end = new Date('2026-07-19');
  const now = new Date();
  if(now < start){ const d=Math.ceil((start-now)/86400000); document.getElementById('daysLeft').textContent=d+'天后'; }
  else if(now <= end){ const d=Math.floor((now-start)/86400000)+1; document.getElementById('daysLeft').textContent='第'+d+'天'; }
  else{ document.getElementById('daysLeft').textContent='已结束'; }

  [FX, TP, IDX] = await Promise.all([
    gj('data/fixtures.json'),
    gj('data/team_profiles.json'),
    gj('data/index.json')
  ]);

  if(!FX){ document.getElementById('scheduleLoading').style.display='none'; document.getElementById('scheduleError').style.display='block'; return; }

  document.getElementById('scheduleLoading').style.display='none';
  document.getElementById('scheduleContent').style.display='block';

  renderSchedule();
  renderGroups();
  renderTeams();
  renderNews();
  renderStats();
  renderArchive();
}

// ─── TABS ───────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e=>{
  const tab = e.target.closest('[data-tab]');
  if(!tab) return;
  const t = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  currentTab = t;
  if(t==='predict') renderPredict();
  if(t==='stats') renderStats();
});

// ─── SCHEDULE ───────────────────────────────────────────────────────────────
function renderSchedule(){
  if(!FX) return;
  const allMatches = [...(FX.matches||[]), ...(FX.knockout||[])];
  const today = todayKey();
  const byDate = {};
  allMatches.forEach(m=>{
    const k = fmtKey(toBeijing(m.utc));
    if(!byDate[k]) byDate[k]=[];
    byDate[k].push(m);
  });

  const todayArr = byDate[today]||[];
  const todayEl = document.getElementById('todayMatches');
  todayEl.innerHTML = todayArr.length ? todayArr.map(m=>matchCardHTML(m)).join('') : '<div class="empty">今日暂无比赛</div>';

  const allDates = Object.keys(byDate).sort();
  const strip = document.getElementById('dateStrip');
  strip.innerHTML = allDates.map(d=>{
    const label = d===today ? '今天' : d.slice(5).replace('-','/');
    const isToday = d===today;
    return `<button class="date-btn${d===today?' active today':''}" data-date="${d}">${label}</button>`;
  }).join('');

  strip.addEventListener('click', e=>{
    const btn = e.target.closest('.date-btn');
    if(!btn) return;
    document.querySelectorAll('.date-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    currentDateStr = btn.dataset.date;
    renderDateMatches(byDate[currentDateStr]||[]);
  });

  currentDateStr = today;
  renderDateMatches(todayArr);
}

function renderDateMatches(arr){
  const el = document.getElementById('dateMatches');
  el.innerHTML = arr.length ? arr.map(m=>matchCardHTML(m)).join('') : '<div class="empty">该日期无比赛</div>';
}

function matchCardHTML(m){
  const hTeam = getTeamByName(m.home);
  const aTeam = getTeamByName(m.away);
  const hFlag = hTeam?hTeam.flag:(FX.teams&&FX.teams[m.home]?FX.teams[m.home].flag:'🏳️');
  const aFlag = aTeam?aTeam.flag:(FX.teams&&FX.teams[m.away]?FX.teams[m.away].flag:'🏳️');
  const hName = hTeam?hTeam.name:m.home;
  const aName = aTeam?aTeam.name:m.away;
  const bjTime = fmtTime(m.utc);
  const now = Date.now();
  const ms = new Date(m.utc).getTime();
  const isLive = now>ms && now<ms+105*60*1000;
  const isDone = now>ms+105*60*1000;
  const badge = isLive ? '<span class="match-group-badge badge-live">🔴 进行中</span>'
               : isDone ? '<span class="match-group-badge badge-done">已结束</span>'
               : `<span class="match-group-badge">${m.group?'小组'+m.group:m.round||'淘汰赛'}</span>`;
  const score = m.score || (isDone?'? - ?':bjTime);
  return `<div class="match-card${isLive?' live':''}" onclick="openMatchModal('${m.id}')">
    <div class="team-side">
      <div class="team-flag">${hFlag}</div>
      <div class="team-name">${hName}<span class="sub">${m.home}</span></div>
    </div>
    <div class="match-center">
      <div class="match-score">${score}</div>
      <div class="match-meta">${badge}</div>
      <div class="match-meta" style="font-size:.65rem;color:var(--text3)">${m.venue||''}</div>
    </div>
    <div class="team-side right">
      <div class="team-flag">${aFlag}</div>
      <div class="team-name">${aName}<span class="sub">${m.away}</span></div>
    </div>
  </div>`;
}

    return `<div class="group-card">

// ─── TEAMS ──────────────────────────────────────────────────────────────────
function renderTeams(){
  if(!TP) return;
  const teams = TP.teams||{};
  const confs = [...new Set(Object.values(teams).map(t=>t.confederation).filter(Boolean))].sort();
  const filter = document.getElementById('teamsFilter');
  filter.innerHTML = ['全部',...confs].map((c,i)=>
    `<button class="filter-btn${i===0?' active':''}" data-conf="${c}">${c}</button>`
  ).join('');
  filter.addEventListener('click', e=>{
    const btn = e.target.closest('.filter-btn');
    if(!btn) return;
    filter.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    renderTeamCards(btn.dataset.conf);
  });
  renderTeamCards('全部');
}

function renderTeamCards(conf){
  const teams = TP?TP.teams:{};
  const grid = document.getElementById('teamsGrid');
  const entries = Object.entries(teams).filter(([,t])=>conf==='全部'||t.confederation===conf)
    .sort(([,a],[,b])=>a.fifaRank-b.fifaRank);
  grid.innerHTML = entries.map(([code,t])=>`
    <div class="team-card" onclick="openTeamModal('${code}')">
      <div class="flag">${t.flag}</div>
      <div class="tname">${t.name}</div>
      <div class="tgroup">小组 ${t.group} · ${t.confederation}</div>
      <div class="trank">FIFA #${t.fifaRank}</div>
      <div class="tcoach">⚙️ ${t.coach}</div>
      <div class="tstar">⭐ ${t.starPlayer}</div>
    </div>
  `).join('');
}

// ─── MATCH MODAL ─────────────────────────────────────────────────────────────
async function openMatchModal(id){
  if(!FX) return;
  const allMatches = [...(FX.matches||[]), ...(FX.knockout||[])];
  const m = allMatches.find(x=>x.id===id);
  if(!m) return;
  const hTeam = getTeamByName(m.home)||{};
  const aTeam = getTeamByName(m.away)||{};
  const hFlag = hTeam.flag||(FX.teams&&FX.teams[m.home]?FX.teams[m.home].flag:'🏳️');
  const aFlag = aTeam.flag||(FX.teams&&FX.teams[m.away]?FX.teams[m.away].flag:'🏳️');
  const hName = hTeam.name||m.home;
  const aName = aTeam.name||m.away;
  const bjTime = fmtTime(m.utc);
  const bjDate = fmtKey(toBeijing(m.utc));
  const score = m.score||'-';

  // Try to find prediction
  let pred = null;
  const predData = await gj(`data/predictions/${bjDate}.json`);
  if(predData&&predData.matches){
    pred = predData.matches.find(x=>x.id===id||
      (x.homeCode&&hTeam.code&&x.homeCode===hTeam.code)||
      (x.home&&(x.home===m.home||x.home===hName)));
  }

  let predHTML = '';
  if(pred&&pred.predictions){
    const p = pred.predictions.fable5||pred.predictions.opta||{};
    const h=p.home||33,dr=p.draw||33,a=p.away||34;
    const sc = pred.predictions.fable5?pred.predictions.fable5.score:'';
    predHTML = `
      <div class="section-title" style="margin-top:0">预测概率</div>
      <div class="odds-grid">
        <div class="odds-box"><div class="ol">${hName}胜</div><div class="ov" style="color:#3b82f6">${h}%</div></div>
        <div class="odds-box"><div class="ol">平局</div><div class="ov" style="color:#6b7280">${dr}%</div></div>
        <div class="odds-box"><div class="ol">${aName}胜</div><div class="ov" style="color:#ef4444">${a}%</div></div>
      </div>
      <div class="prob-bar-wrap">
        <div class="label"><span>${hName}</span><span>平</span><span>${aName}</span></div>
        <div class="prob-bar">
          <div style="background:#3b82f6;width:${h}%"></div>
          <div style="background:#6b7280;width:${dr}%"></div>
          <div style="background:#ef4444;width:${a}%"></div>
        </div>
      </div>
      ${sc?`<div class="pred-score" style="margin-bottom:12px">🎯 预测比分：${sc}</div>`:''}
      ${pred.analysis?`<div class="analysis-box"><h4>📋 赛前分析</h4>${pred.analysis}</div>`:''}
      ${pred.keyRisk?`<div class="analysis-box" style="margin-top:8px;border-color:rgba(245,158,11,.3)"><h4>⚠️ 关键变数</h4>${pred.keyRisk}</div>`:''}
    `;
  }

  document.getElementById('matchModalTitle').textContent = hName+' vs '+aName;
  document.getElementById('matchModalBody').innerHTML = `
    <div class="match-modal-hero">
      <div class="match-modal-team">
        <div class="match-modal-flag">${hFlag}</div>
        <div class="match-modal-name">${hName}</div>
        ${hTeam.fifaRank?`<div style="font-size:.7rem;color:var(--text3)">FIFA #${hTeam.fifaRank}</div>`:''}
      </div>
      <div>
        <div class="match-modal-score">${score}</div>
        <div class="match-modal-time">北京时间 ${bjDate} ${bjTime}</div>
        <div style="font-size:.72rem;color:var(--text3);margin-top:4px">${m.venue||''}</div>
        ${m.group?`<div style="font-size:.72rem;color:var(--accent2);margin-top:2px">小组 ${m.group}</div>`:''}
      </div>
      <div class="match-modal-team">
        <div class="match-modal-flag">${aFlag}</div>
        <div class="match-modal-name">${aName}</div>
        ${aTeam.fifaRank?`<div style="font-size:.7rem;color:var(--text3)">FIFA #${aTeam.fifaRank}</div>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="analysis-box" onclick="openTeamModal('${m.home}')" style="cursor:pointer;text-align:center">
        <div style="font-size:.7rem;color:var(--text3);margin-bottom:4px">主队阵容</div>
        <div style="font-size:.8rem;color:var(--accent2)">🔍 查看 ${hName}</div>
        ${hTeam.starPlayer?`<div style="font-size:.72rem;color:var(--accent3);margin-top:2px">⭐ ${hTeam.starPlayer}</div>`:''}
      </div>
      <div class="analysis-box" onclick="openTeamModal('${m.away}')" style="cursor:pointer;text-align:center">
        <div style="font-size:.7rem;color:var(--text3);margin-bottom:4px">客队阵容</div>
        <div style="font-size:.8rem;color:var(--accent2)">🔍 查看 ${aName}</div>
        ${aTeam.starPlayer?`<div style="font-size:.72rem;color:var(--accent3);margin-top:2px">⭐ ${aTeam.starPlayer}</div>`:''}
      </div>
    </div>
    ${predHTML}
  `;
  openModal('matchModal');
}

    <p style="margin-bottom:12px">${n.excerpt}</p>
    <p>这场比赛/资讯将持续更新。所有预测数据均由AI模型Fable5基于历史数据、当前状态、阵容信息和战术分析生成。预测仅供参考，实际比赛结果存在不确定性。</p>
    <div class="news-footer" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">${n.time} · ${n.source}</div>
  `;
  openModal('newsModal');
}

// ─── PREDICT ─────────────────────────────────────────────────────────────────
async function renderPredict(){
  const ldEl = document.getElementById('predictLoading');
  const ctEl = document.getElementById('predictContent');
  const emEl = document.getElementById('predictEmpty');
  ldEl.style.display='flex'; ctEl.style.display='none'; emEl.style.display='none';

  const today = todayKey();
  const data = await gj(`data/predictions/${today}.json`);
  ldEl.style.display='none';
  if(!data||!data.matches||!data.matches.length){emEl.style.display='block';return;}

  ctEl.style.display='block';
  ctEl.innerHTML = `<div class="pred-grid">${data.matches.map(m=>predCardHTML(m)).join('')}</div>`;
}

function predCardHTML(m){
  const p5 = m.predictions?m.predictions.fable5:{};
  const op = m.predictions?m.predictions.opta:{};
  const h=p5.home||op.home||33, dr=p5.draw||op.draw||33, a=p5.away||op.away||34;
  const score = p5.score||'?-?';
  const hTeam = getTeamByName(m.home)||getTeamByCode(m.homeCode)||{};
  const aTeam = getTeamByName(m.away)||getTeamByCode(m.awayCode)||{};
  return `<div class="pred-card" onclick="openMatchModal('${m.id}')">
    <div class="pred-header">
      <div class="pred-teams">
        <div class="pred-team"><div class="pred-flag">${hTeam.flag||'🏳️'}</div><div class="pred-name">${hTeam.name||m.home}</div></div>
        <div class="pred-vs">VS</div>
        <div class="pred-team"><div class="pred-flag">${aTeam.flag||'🏳️'}</div><div class="pred-name">${aTeam.name||m.away}</div></div>
      </div>
      <div class="pred-time">${m.kickoffBeijing?m.kickoffBeijing.slice(11,16)+' 北京时间':''}</div>
    </div>
    <div class="pred-body">
      <div class="pred-bars">
        <div class="pred-bar-h" style="width:${h}%"></div>
        <div class="pred-bar-d" style="width:${dr}%"></div>
        <div class="pred-bar-a" style="width:${a}%"></div>
      </div>
      <div class="pred-probs">
        <span style="color:#3b82f6">${h}%</span>
        <span style="color:#6b7280">${dr}%</span>
        <span style="color:#ef4444">${a}%</span>
      </div>
      <div class="pred-score">🎯 ${score}</div>
      ${m.analysis?`<div class="pred-analysis">${m.analysis.slice(0,120)}...</div>`:''}
    </div>
  </div>`;
}

// ─── STATS ───────────────────────────────────────────────────────────────────
async function renderStats(){
  const stats = await gj('data/stats.json');
  if(!stats) return;
  const t = stats.totals||{};
  const f5 = t.fable5||{};
  const el = document.getElementById('statsCards');
  el.innerHTML = [
    {v:t.matches||0, l:'已预测场次'},
    {v:f5.correct||0, l:'Fable5正确次数'},
    {v:f5.total>0?Math.round(f5.correct/f5.total*100)+'%':'--', l:'Fable5准确率'},
    {v:t.opta?Math.round((t.opta.correct||0)/(t.opta.total||1)*100)+'%':'--', l:'Opta准确率'},
  ].map(x=>`<div class="stat-box"><div class="sv">${x.v}</div><div class="sl">${x.l}</div></div>`).join('');
  loadChartJs(stats);
}

function loadChartJs(stats){
  if(window.Chart){ renderChart(stats); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload=()=>renderChart(stats);
  s.onerror=()=>{};
  document.head.appendChild(s);
}

function renderChart(stats){
  const ctx = document.getElementById('accuracyChart');
  if(!ctx||!stats.series||!stats.series.length) return;
  const labels = stats.series.map(x=>x.date.slice(5));
  const f5 = stats.series.map(x=>x.fable5Acc||0);
  new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{label:'Fable5准确率',data:f5,borderColor:'#f59e0b',tension:.4,fill:true,backgroundColor:'rgba(245,158,11,.1)',pointRadius:4}]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{y:{beginAtZero:true,max:100,ticks:{color:'#64748b',callback:v=>v+'%'},grid:{color:'rgba(30,58,95,.5)'}},x:{ticks:{color:'#64748b'},grid:{color:'rgba(30,58,95,.3)'}}}}
  });
}

// ─── ARCHIVE ─────────────────────────────────────────────────────────────────
async function renderArchive(){
  const idx = IDX||await gj('data/index.json');
  const el = document.getElementById('archiveList');
  if(!idx||!idx.dates||!idx.dates.length){el.innerHTML='<div class="empty">暂无归档数据</div>';return;}
  el.innerHTML = idx.dates.sort((a,b)=>b.localeCompare(a)).map(d=>`
    <div class="archive-item">
      <div class="archive-date" onclick="toggleArchive('${d}')">
        📅 ${d} 预测&回顾
        <span id="arc-icon-${d}">▶</span>
      </div>
      <div class="archive-body" id="arc-${d}"></div>
    </div>
  `).join('');
}

async function toggleArchive(date){
  const body = document.getElementById('arc-'+date);
  const icon = document.getElementById('arc-icon-'+date);
  if(body.classList.contains('open')){body.classList.remove('open');icon.textContent='▶';return;}
  body.classList.add('open');
  icon.textContent='▼';
  if(body.innerHTML.trim()) return;
  body.innerHTML='<div class="loading" style="padding:20px"><div class="spinner"></div><span>加载中...</span></div>';
  const [pred, rev] = await Promise.all([gj(`data/predictions/${date}.json`),gj(`data/reviews/${date}.json`)]);
  let html = '';
  if(pred&&pred.matches&&pred.matches.length){
    html += `<div style="font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px">📋 预测 (${pred.matches.length}场)</div>`;
    html += pred.matches.map(m=>{
      const p5=m.predictions?m.predictions.fable5:{};
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem">
        <span style="color:var(--text)">${m.home} vs ${m.away}</span>
        <span style="color:var(--accent)">${p5.score||'?-?'} (${p5.home||'-'}%/${p5.draw||'-'}%/${p5.away||'-'}%)</span>
      </div>`;
    }).join('');
  }
  if(rev&&rev.results&&rev.results.length){
    html += `<div style="font-size:.82rem;font-weight:700;color:var(--text2);margin:12px 0 8px">📝 回顾 (${rev.results.length}场)</div>`;
    html += rev.results.map(r=>`
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem">
        <span style="color:var(--text)">${r.home} vs ${r.away}</span>
        <span style="color:${r.correct?'var(--accent3)':'var(--accent4)'}">${r.actual||'?'} ${r.correct?'✓':'✗'}</span>
      </div>
    `).join('');
  }
  if(!html) html = '<div class="empty">该日期暂无数据</div>';
  body.innerHTML = `<div style="padding:12px">${html}</div>`;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function getTeamByCode(code){
  if(!TP) return null;
  return TP.teams[code]||null;
}
function getTeamByName(name){
  if(!TP) return null;
  const teams = TP.teams;
  return Object.values(teams).find(t=>t.nameEn===name||t.name===name||
    t.nameEn.toLowerCase()===name.toLowerCase());
}

function openModal(id){
  document.getElementById(id).classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('click', e=>{
  if(e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));
  }
});

// ─── BOOT ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
